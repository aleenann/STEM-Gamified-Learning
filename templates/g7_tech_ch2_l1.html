<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logic Builder - Grade 7 Technology</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --panel-bg: #1e293b;
            --code-bg: #0f172a;
            --block-blue: #3b82f6;
            --block-orange: #f59e0b;
            --block-green: #10b981;
            --text-light: #f1f5f9;
        }

        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background: #0f172a;
            color: var(--text-light);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .game-header {
            background: var(--panel-bg);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #334155;
            z-index: 100;
        }

        .main-workspace {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* Command Palette */
        .palette {
            width: 250px;
            background: var(--panel-bg);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            border-right: 2px solid #334155;
        }

        .block {
            padding: 1rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            transition: all 0.2s;
            user-select: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .block:hover { transform: translateX(5px); filter: brightness(1.1); }
        .block-move { background: var(--block-blue); border-bottom: 4px solid #1d4ed8; }
        .block-turn { background: var(--block-orange); border-bottom: 4px solid #b45309; }

        /* Code Stack */
        .workspace {
            flex: 1;
            background: var(--code-bg);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            overflow-y: auto;
            position: relative;
        }

        .stack-item {
            padding: 0.8rem 1.2rem;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideIn 0.3s ease-out;
            margin-bottom: 0.5rem;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .btn-run {
            background: var(--block-green);
            color: white;
            border: none;
            padding: 1rem 2.5rem;
            border-radius: 12px;
            font-weight: 900;
            cursor: pointer;
            font-size: 1.1rem;
            margin-top: auto;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            transition: all 0.2s;
        }
        .btn-run:hover { transform: scale(1.05); }

        /* World View */
        .world-container {
            width: 500px;
            background: #1e293b;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            border-left: 2px solid #334155;
        }

        .grid-maze {
            display: grid;
            grid-template-columns: repeat(8, 50px);
            grid-template-rows: repeat(8, 50px);
            gap: 2px;
            background: #334155;
            padding: 4px;
            border-radius: 8px;
            position: relative;
        }

        .cell {
            width: 50px;
            height: 50px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }
        .cell-path { background: #475569; }
        .cell-wall { background: #1e293b; color: #64748b; }
        .cell-goal { background: var(--block-green); color: white; animation: pulse 2s infinite; }

        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }

        #bot {
            width: 40px;
            height: 40px;
            background: #f1c40f;
            border-radius: 8px;
            position: absolute;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0f172a;
            font-size: 1.5rem;
            z-index: 10;
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: #1e293b;
            padding: 3rem;
            border-radius: 24px;
            text-align: center;
            border: 1px solid #334155;
        }

        .star-container { font-size: 3rem; color: #f1c40f; margin: 1.5rem 0; }
    </style>
</head>
<body>

    <div class="game-header">
        <a href="/student/play?subject=Technology" style="text-decoration: none; color: #94a3b8; font-weight: 700;">
            <i class="fa-solid fa-arrow-left"></i> End Logic Session
        </a>
        <h2 style="margin: 0;">LOGIC BUILDER</h2>
        <div style="display: flex; gap: 1rem; align-items: center;">
            <div style="background: #334155; padding: 0.5rem 1rem; border-radius: 8px; font-weight: 800;">
                <i class="fa-solid fa-layer-group"></i> Level <span id="level-num">1</span>
            </div>
            <div style="background: #334155; padding: 0.5rem 1rem; border-radius: 8px; font-weight: 800; color: #fbbf24;">
                <i class="fa-solid fa-star"></i> <span id="xp-val">0</span> XP
            </div>
        </div>
    </div>

    <div class="main-workspace">
        <!-- Palette -->
        <div class="palette">
            <h4 style="margin: 0; color: #94a3b8; font-size: 0.8rem; text-transform: uppercase;">Blocks</h4>
            <div class="block block-move" onclick="addCommand('move')">
                <i class="fa-solid fa-arrow-up"></i> Move Forward
            </div>
            <div class="block block-turn" onclick="addCommand('left')">
                <i class="fa-solid fa-rotate-left"></i> Turn Left
            </div>
            <div class="block block-turn" onclick="addCommand('right')">
                <i class="fa-solid fa-rotate-right"></i> Turn Right
            </div>
            
            <button class="btn-run" onclick="runCode()" id="run-btn">
                <i class="fa-solid fa-play"></i> RUN CODE
            </button>
            <button style="background: #ef4444; color: white; border: none; padding: 0.8rem; border-radius: 8px; cursor: pointer; font-weight: 700;" onclick="clearCode()">
                CLEAR
            </button>
        </div>

        <!-- Workspace -->
        <div class="workspace">
            <h4 style="margin: 0; color: #94a3b8; font-size: 0.8rem; text-transform: uppercase;">Algorithm Sequence</h4>
            <div id="code-stack">
                <!-- Stacked blocks here -->
            </div>
            <p style="color: #475569; position: absolute; bottom: 20px; left: 20px;" id="hint-text">
                Arrange blocks to reach the green tile!
            </p>
        </div>

        <!-- World -->
        <div class="world-container">
            <div class="grid-maze" id="maze">
                <!-- Grid cells here -->
                <div id="bot"><i class="fa-solid fa-robot"></i></div>
            </div>
            <div style="margin-top: 2rem; text-align: center;">
                <p style="color: #94a3b8; font-size: 0.9rem;">Target: Sequential Efficiency</p>
                <div id="step-indicator" style="font-size: 0.8rem; color: var(--block-green); font-weight: 700;">Idle</div>
            </div>
        </div>
    </div>

    <!-- Result Modal -->
    <div id="result-modal" class="modal">
        <div class="modal-content">
            <h1 id="res-title">Puzzle Solved!</h1>
            <p id="res-msg" style="color: #94a3b8;"></p>
            <div class="star-container" id="stars">
                <i class="fa-solid fa-star"></i>
                <i class="fa-solid fa-star"></i>
                <i class="fa-solid fa-star"></i>
            </div>
            <button class="btn-run" style="width: 100%; border: none;" onclick="nextLevel()">NEXT CHALLENGE</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        const state = {
            level: 0,
            xp: 0,
            commands: [],
            botPos: { x: 0, y: 7 },
            botDirection: 0, // 0: N, 1: E, 2: S, 3: W
            active: false,
            username: "{{ session.get('username') }}"
        };

        const levels = [
            {
                start: {x:0, y:7}, goal: {x:0, y:4}, 
                walls: [[1,7], [1,6], [1,5], [1,4]],
                optimal: 3
            },
            {
                start: {x:0, y:7}, goal: {x:2, y:5}, 
                walls: [[0,6], [1,6], [2,7], [2,6]],
                optimal: 4
            },
            {
                start: {x:0, y:7}, goal: {x:4, y:3},
                walls: [[1,7], [1,6], [1,5], [0,4], [1,4], [2,4], [3,4], [4,4]],
                optimal: 7
            }
        ];

        function initLevel() {
            const maze = document.getElementById('maze');
            const lvl = levels[state.level % levels.length];
            maze.querySelectorAll('.cell').forEach(c => c.remove());
            
            for(let y=0; y<8; y++) {
                for(let x=0; x<8; x++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    if(x === lvl.goal.x && y === lvl.goal.y) cell.classList.add('cell-goal');
                    else if(lvl.walls.some(w => w[0] === x && w[1] === y)) cell.classList.add('cell-wall');
                    else cell.classList.add('cell-path');
                    maze.appendChild(cell);
                }
            }
            
            resetBot();
            document.getElementById('level-num').innerText = state.level + 1;
        }

        function resetBot() {
            const lvl = levels[state.level % levels.length];
            state.botPos = {...lvl.start};
            state.botDirection = 0;
            updateBotVisual();
        }

        function updateBotVisual() {
            const bot = document.getElementById('bot');
            bot.style.left = (state.botPos.x * 52 + 4) + 'px';
            bot.style.top = (state.botPos.y * 52 + 4) + 'px';
            bot.style.transform = `rotate(${state.botDirection * 90}deg)`;
        }

        function addCommand(type) {
            const stack = document.getElementById('code-stack');
            const item = document.createElement('div');
            item.className = 'stack-item ' + (type === 'move' ? 'block-move' : 'block-turn');
            
            let label = '';
            if(type === 'move') label = 'Move Forward';
            if(type === 'left') label = 'Turn Left';
            if(type === 'right') label = 'Turn Right';
            
            const id = Date.now();
            item.innerHTML = `<span><i class="fa-solid fa-code"></i> ${label}</span> <i class="fa-solid fa-trash" style="cursor:pointer" onclick="removeCommand(${id}, this)"></i>`;
            item.dataset.id = id;
            item.dataset.type = type;
            
            stack.appendChild(item);
            state.commands.push({ id, type });
        }

        function removeCommand(id, el) {
            el.parentElement.remove();
            state.commands = state.commands.filter(c => c.id !== id);
        }

        function clearCode() {
            document.getElementById('code-stack').innerHTML = '';
            state.commands = [];
            resetBot();
        }

        async function runCode() {
            if(state.commands.length === 0 || state.active) return;
            state.active = true;
            resetBot();
            
            const btn = document.getElementById('run-btn');
            const indicator = document.getElementById('step-indicator');
            btn.innerText = 'EXECUTING...';
            btn.style.opacity = '0.5';

            for(let cmd of state.commands) {
                indicator.innerText = `Step: ${cmd.type.toUpperCase()}`;
                await new Promise(r => setTimeout(r, 600));
                
                if(cmd.type === 'move') {
                    if(state.botDirection === 0) state.botPos.y--;
                    if(state.botDirection === 1) state.botPos.x++;
                    if(state.botDirection === 2) state.botPos.y++;
                    if(state.botDirection === 3) state.botPos.x--;
                } else if(cmd.type === 'left') {
                    state.botDirection = (state.botDirection + 3) % 4;
                } else if(cmd.type === 'right') {
                    state.botDirection = (state.botDirection + 1) % 4;
                }

                updateBotVisual();

                // Check collision
                const lvl = levels[state.level % levels.length];
                if(state.botPos.x < 0 || state.botPos.x > 7 || state.botPos.y < 0 || state.botPos.y > 7 ||
                   lvl.walls.some(w => w[0] === state.botPos.x && w[1] === state.botPos.y)) {
                    indicator.innerText = "CRASH DETECTED!";
                    indicator.style.color = '#ef4444';
                    await new Promise(r => setTimeout(r, 1000));
                    state.active = false;
                    btn.innerText = 'FIX CODE & RUN';
                    btn.style.opacity = '1';
                    indicator.style.color = 'var(--block-green)';
                    return;
                }
            }

            // Check goal
            const lvl = levels[state.level % levels.length];
            if(state.botPos.x === lvl.goal.x && state.botPos.y === lvl.goal.y) {
                showResult(true);
            } else {
                indicator.innerText = "NOT AT GOAL";
                state.active = false;
                btn.innerText = 'RETRY CODE';
                btn.style.opacity = '1';
            }
        }

        function showResult(win) {
            const modal = document.getElementById('result-modal');
            const stars = document.getElementById('stars');
            const msg = document.getElementById('res-msg');
            const lvl = levels[state.level % levels.length];

            let starCount = 3;
            if(state.commands.length > lvl.optimal) starCount = 2;
            if(state.commands.length > lvl.optimal + 3) starCount = 1;

            stars.innerHTML = '';
            for(let i=0; i<3; i++) {
                const star = document.createElement('i');
                star.className = 'fa-solid fa-star';
                if(i >= starCount) star.style.color = '#334155';
                stars.appendChild(star);
            }

            msg.innerText = `You completed the algorithm in ${state.commands.length} blocks! ${starCount === 3 ? 'Maximum efficiency achieved!' : 'Can you do it in fewer blocks?'}`;
            
            const gain = 50 * starCount;
            state.xp += gain;
            document.getElementById('xp-val').innerText = state.xp;
            
            modal.style.display = 'flex';
            confetti();
            saveScore();
            state.active = false;
            document.getElementById('run-btn').innerText = 'RUN CODE';
            document.getElementById('run-btn').style.opacity = '1';
        }

        function nextLevel() {
            document.getElementById('result-modal').style.display = 'none';
            state.level++;
            clearCode();
            initLevel();
        }

        function saveScore() {
            fetch('/save_score', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `username=${encodeURIComponent(state.username)}&score=${state.xp}&subject=Technology&game_name=G7_Tech_Ch2_L1`
            });
        }

        window.onload = initLevel;
    </script>
</body>
</html>
