<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Login - STEM Learning</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="login-container">
        <div class="card login-card text-center">
            
            <div class="mb-2">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                    <button onclick="window.location.href='/'" style="width: auto; background: transparent; color: var(--text-muted); padding: 0.5rem;"><i class="fa-solid fa-arrow-left"></i> Back</button>
                    <i class="fa-solid fa-chalkboard-user" style="font-size: 2rem; color: var(--secondary);"></i>
                </div>
                <h1 style="color: var(--text-main); font-size: 1.5rem;">Teacher Login</h1>
                <p class="text-muted mt-2" style="font-size: 0.9rem;">Please enter your staff credentials</p>
            </div>

            <!-- Sign In Form -->
            <form action="/login" method="POST" style="margin-top: 1.5rem;">
                <input type="hidden" name="role" value="teacher">
                <div class="form-group text-left">
                    <input type="text" name="username" placeholder="Staff Username" required>
                </div>
                <div class="form-group text-left mb-2">
                    <input type="password" name="password" placeholder="Password" required>
                </div>
                <button type="submit" style="background: var(--secondary);">Sign In <i class="fa-solid fa-arrow-right" style="margin-left: 0.5rem;"></i></button>
            </form>
            
        </div>
    </div>

</body>
</html>
