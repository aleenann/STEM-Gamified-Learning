<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login - Brainiac</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="login-container">
        <div class="card login-card text-center">
            
            <div class="mb-2">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                    <button onclick="window.location.href='/'" style="width: auto; background: transparent; color: var(--text-muted); padding: 0.5rem;"><i class="fa-solid fa-arrow-left"></i> Back</button>
                    <i class="fa-solid fa-user-graduate" style="font-size: 2rem; color: var(--primary);"></i>
                </div>
                <h1 style="color: var(--text-main); font-size: 1.5rem;">Student Login</h1>
                <p class="text-muted mt-2" style="font-size: 0.9rem;">Please enter your school credentials</p>
            </div>

            {% if error %}
            <div style="background: rgba(34, 197, 94, 0.4); color: #22C55E; border: 1px solid #22C55E; border-radius: 8px; padding: 0.75rem; margin-top: 1.5rem; text-align: center; font-weight: 500; font-size: 0.9rem;">
                <i class="fa-solid fa-circle-exclamation mr-1"></i> {{ error }}
            </div>
            {% endif %}

            <!-- Sign In Form -->
            <form action="/login" method="POST" style="margin-top: 1.5rem;">
                <input type="hidden" name="role" value="student">
                <div class="form-group text-left">
                    <input type="text" name="username" placeholder="Student ID (e.g., G6-01)" required>
                </div>
                <div class="form-group text-left mb-2">
                    <input type="password" name="password" placeholder="Password" required>
                </div>
                <button type="submit">Sign In <i class="fa-solid fa-arrow-right" style="margin-left: 0.5rem;"></i></button>
            </form>
            
        </div>
    </div>

</body>
</html>
