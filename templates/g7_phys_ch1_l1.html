<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rookie Track: Basics of Speed - Grade 7 Physics</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --track-gray: #1e293b;
            --road-yellow: #facc15;
            --nitro-blue: #3b82f6;
            --danger-red: #ef4444;
            --success-green: #10b981;
        }

        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background: #0f172a;
            color: white;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .game-header {
            background: rgba(15, 23, 42, 0.9);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #1e293b;
            z-index: 100;
        }

        .hud-item {
            background: #1e293b;
            padding: 0.5rem 1.2rem;
            border-radius: 99px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .btn-exit {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            padding: 0.6rem 1.2rem;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 800;
            border: 1px solid rgba(239, 68, 68, 0.2);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn-exit:hover {
            background: #ef4444;
            color: white;
            transform: translateX(-5px);
        }

        /* Track Area */
        .track-container {
            flex: 1;
            position: relative;
            background: linear-gradient(to bottom, #0f172a, #1e293b);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .road {
            width: 90%;
            height: 120px;
            background: #334155;
            position: relative;
            border-radius: 20px;
            border: 4px solid #475569;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .road::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 4px;
            background: repeating-linear-gradient(90deg, transparent, transparent 40px, white 40px, white 80px);
            transform: translateY(-50%);
        }

        .finish-line {
            position: absolute;
            right: 0;
            top: 0;
            width: 40px;
            height: 100%;
            background: repeating-linear-gradient(45deg, #000, #000 10px, #fff 10px, #fff 20px);
            z-index: 5;
        }

        .car {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 3rem;
            color: var(--nitro-blue);
            z-index: 10;
            transition: left 1.5s ease-out;
            filter: drop-shadow(0 0 10px var(--nitro-blue));
        }

        .car.moving {
            animation: shake 0.1s infinite;
        }

        @keyframes shake {
            0% { transform: translateY(-50%) translateX(1px); }
            50% { transform: translateY(-50%) translateX(-1px); }
            100% { transform: translateY(-50%) translateX(1px); }
        }

        /* Controls */
        .controls-panel {
            background: #1e293b;
            padding: 2rem;
            border-top: 4px solid #334155;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .task-card {
            background: rgba(255,255,255,0.05);
            padding: 1.5rem;
            border-radius: 20px;
            border: 2px solid #334155;
        }

        .slider-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        input[type="range"] {
            width: 100%;
            height: 10px;
            background: #334155;
            border-radius: 5px;
            appearance: none;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 24px;
            height: 24px;
            background: var(--nitro-blue);
            border-radius: 50%;
            border: 4px solid white;
            box-shadow: 0 0 15px var(--nitro-blue);
        }

        .btn-launch {
            background: var(--nitro-blue);
            color: white;
            border: none;
            padding: 1rem 3rem;
            font-size: 1.5rem;
            font-weight: 900;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 1rem;
            width: 100%;
        }

        .btn-launch:hover { transform: scale(1.05); background: #2563eb; }
        .btn-launch:disabled { background: #475569; cursor: not-allowed; opacity: 0.5; }

        /* Modals */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .modal-content {
            background: #1e293b;
            padding: 3rem;
            border-radius: 40px;
            text-align: center;
            max-width: 500px;
            border: 2px solid #334155;
        }

        .formula-alert {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid var(--nitro-blue);
            padding: 1rem;
            border-radius: 12px;
            color: var(--nitro-blue);
            font-weight: 700;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>

    <div class="game-header">
        <button class="btn-exit" onclick="history.back()">
            <i class="fa-solid fa-person-running"></i> EXIT
        </button>
        <div class="hud-item" style="color: var(--road-yellow);">
            <i class="fa-solid fa-trophy"></i> XP: <span id="xp-val">0</span>
        </div>
    </div>

    <div class="track-container">
        <div class="road">
            <div class="finish-line"></div>
            <div id="car" class="car" style="left: 20px;"><i class="fa-solid fa-car-side"></i></div>
            <div id="distance-label" style="position: absolute; right: 50px; bottom: 10px; font-weight: 950; color: #94a3b8;">100m TARGET</div>
        </div>
    </div>

    <div class="controls-panel">
        <div class="task-card">
            <h2 style="margin-top: 0; color: var(--nitro-blue);"><i class="fa-solid fa-bullseye"></i> Mission</h2>
            <p id="task-text" style="font-size: 1.2rem; font-weight: 600;">Reach exactly 100 meters in exactly 10 seconds.</p>
            <div class="formula-alert">
                👉 Speed = Distance ÷ Time
            </div>
        </div>

        <div class="task-card slider-container">
            <div style="display: flex; justify-content: space-between;">
                <label style="font-weight: 700;">Set Car Speed:</label>
                <span id="speed-val" style="font-weight: 900; color: var(--nitro-blue);">0 m/s</span>
            </div>
            <input type="range" id="speed-slider" min="0" max="25" value="0">
            <button id="launch-btn" class="btn-launch" onclick="launchCar()">LAUNCH!</button>
        </div>
    </div>

    <!-- Success Modal -->
    <div id="success-modal" class="modal">
        <div class="modal-content">
            <i class="fa-solid fa-circle-check" style="font-size: 5rem; color: var(--success-green); margin-bottom: 1rem;"></i>
            <h1 id="success-title" style="font-size: 2.5rem; margin: 0;">Success!</h1>
            <p id="success-text" style="font-size: 1.2rem; color: #94a3b8;">Question complete.</p>
            <div style="background: rgba(16, 185, 129, 0.1); padding: 1.5rem; border-radius: 20px; border: 1px solid var(--success-green); margin: 1.5rem 0;">
                <span id="xp-added" style="font-size: 2rem; font-weight: 900;">+50 XP</span>
            </div>
            <div id="modal-actions" style="display: flex; flex-direction: column; gap: 1rem;">
                <button id="next-q-btn" class="btn-launch" onclick="nextQuestion()">Next Question</button>
                <button id="next-lvl-btn" class="btn-launch" style="display: none;" onclick="location.href='/student/play/phys/g7/ch1_l2'">Next Level</button>
                <button class="btn-launch" style="background: #475569;" onclick="location.href='/student/play?subject=Science'">Go Back</button>
            </div>
        </div>
    </div>

    <!-- Fail Modal -->
    <div id="fail-modal" class="modal">
        <div class="modal-content">
            <i class="fa-solid fa-circle-xmark" style="font-size: 5rem; color: var(--danger-red); margin-bottom: 1rem;"></i>
            <h1 style="font-size: 2.5rem; margin: 0;">Stalled!</h1>
            <p id="fail-reason" style="font-size: 1.2rem; color: #94a3b8;">The car didn't make it to the finish line in time.</p>
            <button class="btn-launch" style="background: var(--danger-red);" onclick="resetGame()">Try Again</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        const questions = [
            { dist: 100, time: 10, text: "Reach exactly 100 meters in exactly 10 seconds." },
            { dist: 150, time: 10, text: "Target: 150 meters in 10 seconds. Calculate your speed!" },
            { dist: 80, time: 4, text: "Mission: 80 meters in 4 seconds. Go fast!" }
        ];

        const state = {
            targetDistance: 100,
            targetTime: 10,
            xp: 0,
            questionsCompleted: 0,
            totalQuestions: 3,
            usedQuestions: [],
            username: "{{ session.get('username') }}",
            active: true,
            startTime: Date.now()
        };

        function initRandomQuestion() {
            if (state.usedQuestions.length >= questions.length) {
                state.usedQuestions = [];
            }
            
            let randomIndex;
            do {
                randomIndex = Math.floor(Math.random() * questions.length);
            } while (state.usedQuestions.includes(randomIndex));
            
            state.usedQuestions.push(randomIndex);
            const q = questions[randomIndex];
            
            state.targetDistance = q.dist;
            state.targetTime = q.time;
            document.getElementById('task-text').innerText = q.text;
            document.getElementById('distance-label').innerText = q.dist + "m TARGET";
            
            // Reset for new question
            state.active = true;
            state.startTime = Date.now();
            document.getElementById('launch-btn').disabled = false;
            document.getElementById('speed-slider').disabled = false;
            car.style.left = '20px';
        }

        function nextQuestion() {
            document.getElementById('success-modal').style.display = 'none';
            initRandomQuestion();
        }

        window.onload = initRandomQuestion;

        const slider = document.getElementById('speed-slider');
        const speedValText = document.getElementById('speed-val');
        const car = document.getElementById('car');
        const launchBtn = document.getElementById('launch-btn');

        slider.oninput = function() {
            speedValText.innerText = this.value + ' m/s';
        }

        function launchCar() {
            if (!state.active) return;
            state.active = false;
            launchBtn.disabled = true;
            slider.disabled = true;

            const launchDuration = (Date.now() - state.startTime);
            const speed = parseInt(slider.value);
            const distanceReached = speed * state.targetTime;
            
            // Animation logic
            car.classList.add('moving');
            
            const roadWidth = document.querySelector('.road').offsetWidth;
            const finishLinePos = roadWidth - 40;
            const multiplier = finishLinePos / state.targetDistance;
            const finalLeft = Math.min(finishLinePos, distanceReached * multiplier);
            
            car.style.left = finalLeft + 'px';

            setTimeout(() => {
                car.classList.remove('moving');
                
                // Calculate Score: 100 + Accuracy Bonus + Time Bonus - Penalty
                let base = 100;
                let accuracyBonus = (distanceReached === state.targetDistance) ? 50 : 0;
                let timeBonus = (launchDuration < 7000) ? 20 : 0;
                let penalty = (distanceReached !== state.targetDistance) ? 20 : 0;
                let finalScore = base + accuracyBonus + timeBonus - penalty;
                
                state.xp = finalScore;

                if (distanceReached === state.targetDistance) {
                    showSuccess();
                } else if (distanceReached > state.targetDistance) {
                    showFail("Overshot! You went too fast.");
                } else {
                    showFail("Shortfall! You went too slow.");
                }
            }, 1600);
        }

        function showSuccess() {
            state.questionsCompleted++;
            document.getElementById('xp-val').innerText = state.xp;
            saveScore(state.xp);
            
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });

            const nextQBtn = document.getElementById('next-q-btn');
            const nextLvlBtn = document.getElementById('next-lvl-btn');
            
            if (state.questionsCompleted >= state.totalQuestions) {
                document.getElementById('success-title').innerText = "Level Complete! 🏁";
                document.getElementById('success-text').innerText = `You've solved all ${state.totalQuestions} missions!`;
                nextQBtn.style.display = 'none';
                nextLvlBtn.style.display = 'block';
            } else {
                document.getElementById('success-title').innerText = "Great Job! ⭐";
                document.getElementById('success-text').innerText = `Question ${state.questionsCompleted} of ${state.totalQuestions} complete.`;
                nextQBtn.style.display = 'block';
                nextLvlBtn.style.display = 'none';
            }

            document.getElementById('success-modal').style.display = 'flex';
        }

        function showFail(reason) {
            document.getElementById('fail-reason').innerText = reason;
            document.getElementById('fail-modal').style.display = 'flex';
        }

        function resetGame() {
            state.active = true;
            launchBtn.disabled = false;
            slider.disabled = false;
            car.style.left = '20px';
            document.getElementById('fail-modal').style.display = 'none';
        }

        function saveScore(xp) {
            fetch('/save_score', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `username=${encodeURIComponent(state.username)}&score=${xp}&subject=Science&game_name=G7_Phys_Ch1_L1`
            });
        }
    </script>
</body>
</html>
