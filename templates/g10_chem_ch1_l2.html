<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grade 10 Chemistry: Equation Master ⚖️</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
  --bg:       #0f172a;
  --surface:  #1e293b;
  --green:    #10b981;
  --green-l:  #064e3b;
  --blue:     #38bdf8;
  --blue-l:   #0c4a6e;
  --text:     #f8fafc;
  --muted:    #94a3b8;
  --border:   #334155;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Outfit', -apple-system, sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh;
}

.topbar {
  position: sticky; top: 0; z-index: 200; display: flex; align-items: center; justify-content: space-between;
  padding: 10px 20px; background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); border-bottom: 2px solid var(--border);
}
.topbar-logo { font-size: 18px; font-weight: 900; color: var(--blue); }
.btn-exit { background: var(--blue-l); border: 1.5px solid #0ea5e9; border-radius: 8px; padding: 5px 12px; font-weight: 800; color: var(--blue); cursor: pointer; }

.container { max-width: 900px; margin: 30px auto; padding: 20px; }

.game-card {
  background: var(--surface); border-radius: 24px; border: 2px solid var(--border); padding: 40px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center;
}

.equation-display {
  display: flex; align-items: center; justify-content: center; gap: 15px;
  font-size: 2.5rem; font-weight: 800; margin-bottom: 40px; flex-wrap: wrap; color: white;
}

.coeff-input {
  width: 60px; height: 60px; font-size: 1.8rem; font-weight: 900; text-align: center;
  border: 4px solid var(--blue-l); border-radius: 12px; color: var(--blue);
  background: var(--blue-l); transition: all 0.2s;
}
.coeff-input:focus { outline: none; border-color: var(--blue); background: #082f49; }

.arrow { font-size: 3rem; color: var(--muted); margin: 0 20px; }

.balance-status {
  display: flex; justify-content: space-around; margin-top: 30px;
  background: #0f172a; padding: 20px; border-radius: 16px;
}
.status-side { flex: 1; }
.atom-count { font-size: 1.1rem; font-weight: 700; color: var(--muted); margin: 5px 0; }
.atom-count.match { color: var(--green); text-shadow: 0 0 10px var(--green-l); }
.atom-count.miss  { color: #ef4444; }

.check-btn {
  margin-top: 40px; padding: 15px 50px; background: var(--blue); color: #0c4a6e;
  border: none; border-radius: 14px; font-size: 1.2rem; font-weight: 900;
  cursor: pointer; box-shadow: 0 6px 20px rgba(56, 189, 248, 0.3); transition: transform 0.2s;
}
.check-btn:hover { transform: translateY(-3px); }

/* Modal */
.fb-overlay {
  position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,.7); display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px);
  transition: opacity 0.3s;
}
.fb-overlay.show { display: flex; animation: fadeIn 0.3s forwards; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.fb-modal { 
  background: var(--surface); border-radius: 24px; padding: 40px; text-align: center; max-width: 450px; width: 92%;
  border: 4px solid var(--blue); transform: scale(0.9); transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: 0 20px 50px rgba(0,0,0,0.5);
}
.fb-overlay.show .fb-modal { transform: scale(1); }

.fb-emoji { font-size: 60px; display: block; margin-bottom: 15px; }
.fb-title { font-size: 26px; font-weight: 900; color: white; margin-bottom: 10px; }
.fb-explain { margin: 15px 0; color: var(--muted); font-weight: 500; line-height: 1.5; }
.fb-xp-pill { 
  display: inline-block; background: var(--green-l); color: var(--green); 
  padding: 10px 25px; border-radius: 20px; font-weight: 900; margin-bottom: 25px;
}
.fb-btn { 
  width: 100%; padding: 15px; background: var(--blue); color: #0c4a6e; border: none; 
  border-radius: 12px; font-weight: 800; cursor: pointer; font-size: 16px;
  transition: transform 0.2s, box-shadow 0.2s;
}
.fb-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(56, 189, 248, 0.3); }

/* Toast */
.toast {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
  background: #1e293b; color: white; padding: 12px 25px; border-radius: 12px;
  font-weight: 700; font-size: 14px; z-index: 1000; transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: 0 10px 30px rgba(0,0,0,0.2); display: flex; align-items: center; gap: 10px;
  border-left: 4px solid var(--blue);
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast i { color: #38bdf8; }


</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">⚖️ Equation Master</div>
  <div style="display:flex; gap:15px; align-items:center;">
    <div style="font-weight:800; color:var(--muted);">Mode: <span style="color:var(--red);">Expert Hard</span></div>
    <div style="font-weight:800; color:var(--muted);">XP: <span id="xpDisplay" style="color:var(--green);">0</span></div>
  </div>
  <button class="btn-exit" onclick="window.location.href='/student/play?subject=Science&sub_subject=Chemistry&chapter=1'">
      <i class="fa-solid fa-person-running"></i> EXIT
  </button>
</div>

<div class="container">
  <div class="game-card">
    <div style="margin-bottom: 30px;">
        <h2 id="taskTitle">Expert Level: Balancing Challenge</h2>
        <p class="text-muted" style="color:var(--muted); font-weight:500;">Balance these complex equations to master Chemistry!</p>
    </div>

    <div class="equation-display" id="equationBox"></div>

    <div class="balance-status">
        <div class="status-side">
            <h4 style="margin-bottom:10px; color:var(--muted); text-transform:uppercase; font-size:0.8rem;">Reactants (Left)</h4>
            <div id="leftStats"></div>
        </div>
        <div style="width:2px; background:var(--border);"></div>
        <div class="status-side">
            <h4 style="margin-bottom:10px; color:var(--muted); text-transform:uppercase; font-size:0.8rem;">Products (Right)</h4>
            <div id="rightStats"></div>
        </div>
    </div>

    <button class="check-btn" onclick="checkBalance()">Submit Answer 🧪</button>
  </div>
</div>

<div class="fb-overlay" id="fbOverlay">
  <div class="fb-modal">
    <div class="fb-emoji" id="fbEmoji">🏆</div>
    <h2 class="fb-title" id="fbTitle">Expertly Balanced!</h2>
    <p class="fb-explain" id="fbExplain"></p>
    <div class="fb-xp-pill" id="fbXPPill">+100 XP</div>
    <button class="fb-btn" id="fbBtn" onclick="handleModalNext()">Keep Going →</button>
  </div>
</div>

<!-- Toast -->
<div id="errorToast" class="toast">
  <i class="fa-solid fa-atom"></i>
  <span id="toastMsg">Equation not balanced yet!</span>
</div>


<script>
const QUESTIONS = [
  {
    equation: [ {c:true}, "Fe", " + ", {c:true}, "H", {s:2}, "O", " → ", {c:true}, "Fe", {s:3}, "O", {s:4}, " + ", {c:true}, "H", {s:2} ],
    check: (vals) => vals[0] === vals[2]*3 && vals[1]*2 === vals[3]*2 && vals[1] === vals[2]*4,
    atoms: ['Fe', 'H', 'O'],
    getLeft: (vals) => ({ Fe: vals[0], H: vals[1]*2, O: vals[1] }),
    getRight: (vals) => ({ Fe: vals[2]*3, H: vals[3]*2, O: vals[2]*4 }),
    explain: "3 Fe + 4 H₂O → Fe₃O₄ + 4 H₂"
  },
  {
    equation: [ {c:true}, "CH", {s:4}, " + ", {c:true}, "O", {s:2}, " → ", {c:true}, "CO", {s:2}, " + ", {c:true}, "H", {s:2}, "O" ],
    check: (vals) => vals[0] === vals[2] && vals[0]*4 === vals[3]*2 && vals[1]*2 === vals[2]*2 + vals[3],
    atoms: ['C', 'H', 'O'],
    getLeft: (vals) => ({ C: vals[0], H: vals[0]*4, O: vals[1]*2 }),
    getRight: (vals) => ({ C: vals[2], H: vals[3]*2, O: vals[2]*2 + vals[3] }),
    explain: "CH₄ + 2 O₂ → CO₂ + 2 H₂O"
  },
  {
    equation: [ {c:true}, "C", {s:6}, "H", {s:12}, "O", {s:6}, " + ", {c:true}, "O", {s:2}, " → ", {c:true}, "CO", {s:2}, " + ", {c:true}, "H", {s:2}, "O" ],
    check: (vals) => vals[0]*6 === vals[2] && vals[0]*12 === vals[3]*2 && vals[0]*6 + vals[1]*2 === vals[2]*2 + vals[3],
    atoms: ['C', 'H', 'O'],
    getLeft: (vals) => ({ C: vals[0]*6, H: vals[0]*12, O: vals[0]*6 + vals[1]*2 }),
    getRight: (vals) => ({ C: vals[2], H: vals[3]*2, O: vals[2]*2 + vals[3] }),
    explain: "C₆H₁₂O₆ + 6 O₂ → 6 CO₂ + 6 H₂O (Cellular Respiration)"
  }
];

let qIdx = 0;
let xp = 0;

function render() {
    const q = QUESTIONS[qIdx];
    const box = document.getElementById('equationBox');
    box.innerHTML = '';
    q.equation.forEach(item => {
        if (typeof item === 'string') {
            const span = document.createElement('span');
            span.innerText = item;
            if (item === ' → ') span.className = 'arrow';
            box.appendChild(span);
        } else if (item.c) {
            const input = document.createElement('input');
            input.type = 'number';
            input.className = 'coeff-input';
            input.value = '';
            input.placeholder = '1';
            input.oninput = updateStats;
            box.appendChild(input);
        } else if (item.s) {
            const sub = document.createElement('sub');
            sub.style.fontSize = '1.2rem';
            sub.style.verticalAlign = 'sub';
            sub.innerText = item.s;
            box.appendChild(sub);
        }
    });
    updateStats();
}

function updateStats() {
    const q = QUESTIONS[qIdx];
    const inputs = document.querySelectorAll('.coeff-input');
    const vals = Array.from(inputs).map(i => parseInt(i.value) || 0);
    const left = q.getLeft(vals);
    const right = q.getRight(vals);
    const leftBox = document.getElementById('leftStats');
    const rightBox = document.getElementById('rightStats');
    leftBox.innerHTML = ''; rightBox.innerHTML = '';
    
    q.atoms.forEach(atom => {
        const lp = document.createElement('p');
        lp.className = `atom-count ${left[atom] === right[atom] && left[atom]>0 ? 'match' : (left[atom]>0 ? 'miss' : '')}`;
        lp.innerText = `${atom}: ${left[atom]}`;
        leftBox.appendChild(lp);
        const rp = document.createElement('p');
        rp.className = `atom-count ${left[atom] === right[atom] && left[atom]>0 ? 'match' : (right[atom]>0 ? 'miss' : '')}`;
        rp.innerText = `${atom}: ${right[atom]}`;
        rightBox.appendChild(rp);
    });
}

function checkBalance() {
    const q = QUESTIONS[qIdx];
    const inputs = document.querySelectorAll('.coeff-input');
    const vals = Array.from(inputs).map(i => parseInt(i.value) || 0);
    
    if (vals.some(v => v <= 0)) {
        showToast("Fill in all coefficients!");
        return;
    }

    if (q.check(vals)) {
        showFeedback(q);
    } else {
        showToast("Equation is not balanced. Keep trying!");
    }
}

function showToast(msg) {
    const toast = document.getElementById('errorToast');
    document.getElementById('toastMsg').innerText = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
}

function showFeedback(q) {
    document.getElementById('fbEmoji').innerText = '🏆';
    document.getElementById('fbTitle').innerText = 'Expertly Balanced!';
    document.getElementById('fbExplain').innerText = "Balanced Equation: " + q.explain;
    document.getElementById('fbXPPill').innerText = '+100 XP';
    
    if (qIdx >= QUESTIONS.length - 1) {
        document.getElementById('fbEmoji').innerText = '💎';
        document.getElementById('fbTitle').innerText = 'Level 2 Completed!';
        document.getElementById('fbExplain').innerText = 'You mastered the most complex chemical equations.';
        document.getElementById('fbXPPill').innerText = `Final XP: ${xp + 100}`;
        document.getElementById('fbBtn').innerText = 'Back to Map';
        saveScore(xp + 100);
    } else {
        document.getElementById('fbBtn').innerText = 'Next Equation →';
    }
    
    document.getElementById('fbOverlay').classList.add('show');
    xp += 100;
    document.getElementById('xpDisplay').innerText = xp;
}

function handleModalNext() {
    if (qIdx >= QUESTIONS.length - 1) {
        window.location.href = '/student/play?subject=Science&sub_subject=Chemistry&chapter=1';
    } else {
        nextQuestion();
    }
}

function nextQuestion() {
    document.getElementById('fbOverlay').classList.remove('show');
    qIdx++;
    render();
}


function saveScore(score) {
    fetch('/save_score', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({
            username: "{{ session.get('username') }}",
            score: score,
            subject: 'Science',
            game_name: 'G10_Chem_Ch1_L2'
        })
    });
}
render();
</script>
</body>
</html>
