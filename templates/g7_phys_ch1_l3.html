<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph City - Grade 7 Physics</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --city-night: #020617;
            --graph-green: #22c55e;
            --graph-blue: #3b82f6;
            --neon-blue: #0ea5e9;
            --glass: rgba(15, 23, 42, 0.8);
        }

        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background: var(--city-night);
            color: white;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-y: auto;
        }

        .game-header {
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #1e293b;
            background: var(--glass);
        }

        .main-container {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 400px;
            padding: 2rem;
            gap: 2rem;
        }

        /* Graph Panel */
        .graph-panel {
            background: rgba(30, 41, 59, 0.5);
            border: 2px solid #1e293b;
            border-radius: 30px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
        }

        .canvas-container {
            flex: 1;
            position: relative;
        }

        /* City View */
        .city-panel {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .car-track {
            height: 100px;
            background: #1e293b;
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            border: 3px solid #334155;
        }

        .car-track::after {
            content: '';
            position: absolute;
            top: 50%; width: 100%; height: 2px;
            background: repeating-linear-gradient(90deg, transparent, transparent 20px, #475569 20px, #475569 40px);
        }

        .car {
            position: absolute;
            left: 20px; top: 50%;
            transform: translateY(-50%);
            font-size: 2.5rem;
            color: var(--neon-blue);
            z-index: 10;
            filter: drop-shadow(0 0 10px var(--neon-blue));
        }

        .control-pad {
            background: var(--glass);
            padding: 1.5rem;
            border-radius: 25px;
            border: 2px solid #334155;
        }

        .btn-action {
            width: 100%;
            padding: 1rem;
            margin-top: 1rem;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-uniform { background: var(--graph-blue); color: white; }
        .btn-nonuniform { background: var(--graph-green); color: white; }
        .btn-launch { background: var(--neon-blue); color: white; margin-top: 2rem; }

        .btn-action:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn-action.selected {
            border: 3px solid white;
            box-shadow: 0 0 15px rgba(255,255,255,0.5);
            transform: scale(1.05);
        }

        /* Modal */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 6, 23, 0.95);
            display: none; align-items: center; justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: #1e293b; padding: 3rem; border-radius: 40px; text-align: center;
            border: 2px solid #334155; max-width: 500px;
        }
    </style>
</head>
<body>

    <div class="game-header">
        <button class="btn-exit" onclick="history.back()">
            <i class="fa-solid fa-person-running"></i> EXIT
        </button>
        <h2 style="margin: 0; color: var(--neon-blue);">Chapter 1: Graph City 📊</h2>
        <div style="background: #1e293b; padding: 0.5rem 1.2rem; border-radius: 99px; font-weight: 700; color: #fbbf24;">
            XP: <span id="xp-val">0</span>
        </div>
    </div>

    <div class="main-container">
        <div class="graph-panel">
            <h3 style="margin: 0 0 1rem; color: #94a3b8;">DISTANCE-TIME DATA STREAM</h3>
            <div class="canvas-container">
                <canvas id="motionGraph"></canvas>
            </div>
        </div>

        <div class="city-panel">
            <div class="control-pad">
                <h3 style="margin-top: 0;"><i class="fa-solid fa-magnifying-glass-chart"></i> Analysis</h3>
                <p id="question" style="color: #cbd5e1; line-height: 1.5;">Identify the type of motion shown in the graph and match the car's speed. Look at the slope of the line!</p>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.5rem; margin-top: 1rem;">
                    <button class="btn-action btn-uniform" onclick="selectType('uniform', this)">Uniform</button>
                    <button class="btn-action btn-nonuniform" onclick="selectType('non-uniform', this)">Non-Uniform</button>
                    <button class="btn-action" style="background: #64748b; color: white;" onclick="selectType('stationary', this)">Stationary</button>
                </div>
            </div>

            <div class="car-track">
                <div id="car" class="car"><i class="fa-solid fa-truck-fast"></i></div>
            </div>

            <button id="launch-btn" class="btn-action btn-launch" onclick="animateGraphCar()" disabled>SYNC & RUN MOTION</button>
            <p id="status-msg" style="text-align: center; color: #64748b; font-size: 0.9rem;">Select motion type first</p>
        </div>
    </div>

    <div id="success-modal" class="modal">
        <div class="modal-content">
            <i class="fa-solid fa-check-double" style="font-size: 5rem; color: var(--graph-green); margin-bottom: 1rem;"></i>
            <h1 id="success-title" style="font-size: 2.5rem; margin: 0;">Graph Decoded!</h1>
            <p id="success-text" style="font-size: 1.2rem; color: #94a3b8;">Question complete.</p>
            <div style="background: rgba(34, 197, 94, 0.1); padding: 1.5rem; border-radius: 20px; border: 1px solid var(--graph-green); margin: 1.5rem 0;">
                <span id="xp-added" style="font-size: 2rem; font-weight: 900; color: var(--graph-green);">+70 XP</span>
            </div>
            <div id="modal-actions" style="display: flex; flex-direction: column; gap: 1rem;">
                <button id="next-q-btn" class="btn-action btn-launch" onclick="nextQuestion()">Next Question</button>
                <button id="next-lvl-btn" class="btn-action btn-launch" style="display: none;" onclick="location.href='/student/play/phys/g7/ch1_l4'">Next Level</button>
                <button class="btn-action" style="background: #475569; color: white;" onclick="location.href='/student/play?subject=Science'">Go Back</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        const ctx = document.getElementById('motionGraph').getContext('2d');
        const questions = [
            { type: 'uniform', data: [0, 20, 40, 60, 80, 100], tension: 0 },
            { type: 'stationary', data: [40, 40, 40, 40, 40, 40], tension: 0 },
            { type: 'non-uniform', data: [0, 5, 20, 45, 80, 125], tension: 0.4 }
        ];

        let motionType = null;
        let wrongPenalty = 0;
        const state = {
            username: "{{ session.get('username') }}",
            xp: 0,
            correctAnswer: 'uniform',
            questionsCompleted: 0,
            totalQuestions: 3,
            usedQuestions: []
        };

        const graph = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [0, 1, 2, 3, 4, 5],
                datasets: [{
                    label: 'Distance (m)',
                    data: [0, 20, 40, 60, 80, 100],
                    borderColor: '#3b82f6',
                    borderWidth: 4,
                    pointRadius: 6,
                    pointBackgroundColor: '#0ea5e9',
                    tension: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: { ticks: { color: '#94a3b8' }, grid: { color: '#1e293b' } },
                    y: { ticks: { color: '#94a3b8' }, grid: { color: '#1e293b' }, beginAtZero: true }
                },
                plugins: { legend: { display: false } }
            }
        });

        function initRandomQuestion() {
            if (state.usedQuestions.length >= questions.length) {
                state.usedQuestions = [];
            }
            
            let randomIndex;
            do {
                randomIndex = Math.floor(Math.random() * questions.length);
            } while (state.usedQuestions.includes(randomIndex));
            
            state.usedQuestions.push(randomIndex);
            const q = questions[randomIndex];
            
            state.correctAnswer = q.type;
            graph.data.datasets[0].data = q.data;
            graph.data.datasets[0].tension = q.tension;
            graph.update();
            
            // Reset for new question
            motionType = null;
            document.querySelectorAll('.btn-action').forEach(b => b.classList.remove('selected'));
            document.getElementById('status-msg').innerText = "Select motion type first";
            document.getElementById('launch-btn').disabled = true;
            const car = document.getElementById('car');
            car.style.transition = 'none';
            car.style.left = '20px';
        }

        function nextQuestion() {
            document.getElementById('success-modal').style.display = 'none';
            initRandomQuestion();
        }

        window.onload = initRandomQuestion;

        function selectType(type, btn) {
            motionType = type;
            document.getElementById('status-msg').innerText = `Ready to sync: ${type.toUpperCase()}`;
            document.getElementById('launch-btn').disabled = false;
            
            // Highlight selection
            document.querySelectorAll('.btn-action').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }

        function animateGraphCar() {
            if (motionType !== state.correctAnswer) {
                wrongPenalty += 30;
                alert(`Incorrect interpretation! Penalty applied (-30). Look at the slope. A straight line means constant (uniform) speed.`);
                return;
            }

            const car = document.getElementById('car');
            const trackWidth = document.querySelector('.car-track').offsetWidth - 80;
            
            // Clear previous animation
            car.style.transition = 'none';
            car.style.left = '20px';
            
            // Trigger reflow
            car.offsetHeight;

            if (state.correctAnswer === 'uniform') {
                car.style.transition = 'left 3s linear';
                car.style.left = trackWidth + 'px';
            } else if (state.correctAnswer === 'non-uniform') {
                car.style.transition = 'left 3s cubic-bezier(0.4, 0, 1, 1)'; // Accelerating
                car.style.left = trackWidth + 'px';
            } else if (state.correctAnswer === 'stationary') {
                // Stationary - just a small visual nudge or stay put
                car.style.transition = 'left 3s linear';
                car.style.left = '20px';
            }

            // Formula: 100 + Graph Accuracy + Interpretation Bonus - Penalty
            let base = 100;
            let graphAccuracy = 100; // Perfect match animation
            let interpretationBonus = 50; // Correct type selected
            state.xp = Math.max(0, base + graphAccuracy + interpretationBonus - wrongPenalty);

            setTimeout(showSuccess, 3500);
        }

        function showSuccess() {
            state.questionsCompleted++;
            document.getElementById('xp-val').innerText = state.xp;
            document.getElementById('xp-added').innerText = `+${state.xp} XP`;
            saveScore(state.xp);
            
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });

            const nextQBtn = document.getElementById('next-q-btn');
            const nextLvlBtn = document.getElementById('next-lvl-btn');
            
            if (state.questionsCompleted >= state.totalQuestions) {
                document.getElementById('success-title').innerText = "Graph Expert! 🏁";
                document.getElementById('success-text').innerText = `Level complete. You've decoded all ${state.totalQuestions} graphs!`;
                nextQBtn.style.display = 'none';
                nextLvlBtn.style.display = 'block';
            } else {
                document.getElementById('success-title').innerText = "Success! ⭐";
                document.getElementById('success-text').innerText = `Graph ${state.questionsCompleted} of ${state.totalQuestions} decoded.`;
                nextQBtn.style.display = 'block';
                nextLvlBtn.style.display = 'none';
            }

            document.getElementById('success-modal').style.display = 'flex';
        }

        function saveScore(xp) {
            fetch('/save_score', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `username=${encodeURIComponent(state.username)}&score=${xp}&subject=Science&game_name=G7_Phys_Ch1_L3`
            });
        }
    </script>
</body>
</html>
