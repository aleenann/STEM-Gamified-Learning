<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brainiac - Welcome</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="login-bg-v2">
        <i class="fa-solid fa-flask floating-icon beaker"></i>
        <i class="fa-solid fa-lightbulb floating-icon lightbulb"></i>

        <div class="welcome-card-v2">
            <div class="welcome-header-v2">
                <h1 class="welcome-title-v2">Brainiac</h1>
                <p style="font-weight: 600; color: #0e0d30; font-size: 1.8rem; margin-top: -0.5rem; margin-bottom: 1.5rem; letter-spacing: 1.5px;">Learn • Play • Grow 🚀</p>
            </div>
            
            <div class="welcome-body-v2">
                
                <div class="welcome-illustration-box">
                    <img src="/static/stemquest_girl_illustration.png" alt="Student Illustration" class="welcome-illustration-img">
                </div>
                
                <div style="display: flex; flex-direction: column; align-items: center; gap: 1rem;">
                    <p class="welcome-prompt-v2" style="font-weight: 500; font-size: 1.15rem; color: #374151;">To get started, please select your portal:</p>
                    <div class="welcome-buttons-v2" style="width: 100%;">
                        <button class="btn-student-login" onclick="window.location.href='/login/student'">
                            <i class="fa-solid fa-graduation-cap btn-icon-large"></i>
                            <span>Student Portal</span>
                        </button>
                        <button class="btn-teacher-login" onclick="window.location.href='/login/teacher'">
                            <i class="fa-solid fa-chalkboard-user btn-icon-large"></i>
                            <span>Teacher Portal</span>
                        </button>
                    </div>
                </div>

            </div>
            
        </div>
    </div>

</body>
</html>
