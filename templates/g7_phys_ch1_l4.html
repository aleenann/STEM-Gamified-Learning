<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendulum Lab - Grade 7 Physics</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --lab-bg: #0f172a;
            --brass: #eab308;
            --string: #94a3b8;
            --laser: #ef4444;
            --glass: rgba(30, 41, 59, 0.7);
        }

        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background: var(--lab-bg);
            color: white;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-y: auto;
        }

        .game-header {
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #1e293b;
        }

        .main-container {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 350px;
            padding: 2rem;
            gap: 2rem;
        }

        /* Lab Area */
        .lab-view {
            background: rgba(30, 41, 59, 0.5);
            border: 2px solid #1e293b;
            border-radius: 40px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 2rem;
        }

        .pendulum-mount {
            width: 200px;
            height: 20px;
            background: #334155;
            border-radius: 10px;
            position: relative;
        }

        .pendulum-container {
            width: 40px;
            height: 350px;
            position: relative;
            transform-origin: top center;
            animation: swing 2s ease-in-out infinite alternate;
            animation-play-state: paused;
        }

        .string {
            width: 2px;
            height: 300px;
            background: var(--string);
            margin: 0 auto;
        }

        .bob {
            width: 40px;
            height: 40px;
            background: radial-gradient(circle at 30% 30%, var(--brass), #854d0e);
            border-radius: 50%;
            margin: -5px auto 0;
            box-shadow: 0 0 20px rgba(234, 179, 8, 0.3);
        }

        @keyframes swing {
            from { transform: rotate(30deg); }
            to { transform: rotate(-30deg); }
        }

        /* Controls */
        .tools-panel {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .timer-display {
            background: #1e293b;
            padding: 2rem;
            border-radius: 30px;
            text-align: center;
            border: 2px solid #475569;
        }

        .time-value {
            font-size: 3.5rem;
            font-family: monospace;
            font-weight: 900;
            color: #22c55e;
            text-shadow: 0 0 10px rgba(34, 197, 94, 0.4);
        }

        .btn-lab {
            width: 100%;
            padding: 1.2rem;
            border: none;
            border-radius: 15px;
            font-weight: 900;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-start { background: #22c55e; color: white; }
        .btn-osc { background: #3b82f6; color: white; }
        .btn-submit { background: #a855f7; color: white; margin-top: 1rem; }

        .btn-lab:disabled { opacity: 0.5; cursor: not-allowed; }

        .input-box {
            background: #0f172a;
            border: 2px solid #334155;
            padding: 0.8rem;
            border-radius: 10px;
            color: white;
            width: 100%;
            font-size: 1.2rem;
            margin-top: 0.5rem;
        }

        /* Modals */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.95);
            display: none; align-items: center; justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: #1e293b; padding: 3rem; border-radius: 40px; text-align: center;
        }
    </style>
</head>
<body>

    <div class="game-header">
        <button class="btn-exit" onclick="history.back()">
            <i class="fa-solid fa-person-running"></i> EXIT
        </button>
        <h2 style="margin: 0; color: var(--brass);">Chapter 1: Pendulum Lab 🕰️</h2>
        <div style="background: #1e293b; padding: 0.5rem 1.2rem; border-radius: 99px; font-weight: 700; color: #fbbf24;">
            XP: <span id="xp-val">0</span>
        </div>
    </div>

    <div class="main-container">
        <div class="lab-view">
            <div class="pendulum-mount"></div>
            <div id="pendulum" class="pendulum-container">
                <div class="string"></div>
                <div class="bob"></div>
            </div>
            
            <div style="position: absolute; bottom: 2rem; background: var(--glass); padding: 1.5rem; border-radius: 20px; border: 1px solid #1e293b; max-width: 80%;">
                <p style="margin: 0 0 0.5rem; font-weight: 800; color: var(--brass);">MISSION: MEASURE PERIODIC MOTION</p>
                <p id="mission-desc" style="margin: 0; color: #cbd5e1;">Start the pendulum. Count 10 oscillations (one back-and-forth swing = 1 oscillation). Stop the timer and calculate the Time Period.</p>
            </div>
        </div>

        <div class="tools-panel">
            <div class="timer-display">
                <p style="margin: 0; color: #64748b; font-weight: 700;">DIGITAL STOPWATCH</p>
                <div id="stopwatch" class="time-value">00:00.0</div>
                <div style="display: flex; gap: 0.5rem; margin-top: 1rem;">
                    <button id="start-btn" class="btn-lab btn-start" onclick="toggleLab()">START SWING</button>
                    <button id="stop-btn" class="btn-lab btn-osc" onclick="stopLab()" disabled>STOP</button>
                </div>
            </div>

            <div class="timer-display" style="text-align: left;">
                <p style="margin: 0 0 1rem; color: #64748b; font-weight: 700;">LAB REPORT</p>
                <label>Counted Oscillations:</label>
                <input type="number" id="count-input" class="input-box" placeholder="10" disabled value="10">
                
                <label style="display: block; margin-top: 1rem;">Time for 10 Oscillations (s):</label>
                <input type="text" id="time-input" class="input-box" readonly>
                
                <label style="display: block; margin-top: 1rem;">Time Period (Time ÷ Count):</label>
                <input type="text" id="period-input" class="input-box" placeholder="Result e.g. 2.0">
                
                <button class="btn-lab btn-submit" id="submit-btn" onclick="verifyResults()" disabled>SUBMIT LAB REPORT</button>
            </div>
        </div>
    </div>

    <div id="success-modal" class="modal">
        <div class="modal-content">
            <i class="fa-solid fa-medal" style="font-size: 5rem; color: #facc15; margin-bottom: 1rem;"></i>
            <h1 id="success-title" style="font-size: 2.5rem; margin: 0;">Lab Expert!</h1>
            <p id="success-text" style="font-size: 1.2rem; color: #94a3b8;">You accurately measured the period.</p>
            <div style="background: rgba(234, 179, 8, 0.1); padding: 1.5rem; border-radius: 20px; border: 1px solid var(--brass); margin: 1.5rem 0;">
                <span id="xp-added" style="font-size: 2rem; font-weight: 900; color: var(--brass);">+80 XP</span>
            </div>
            <div id="modal-actions" style="display: flex; flex-direction: column; gap: 1rem;">
                <button id="next-q-btn" class="btn-lab btn-start" onclick="nextQuestion()">Next Experiment</button>
                <button id="finish-btn" class="btn-lab btn-start" style="display: none;" onclick="location.href='/student/play?subject=Science'">Finish Chapter</button>
                <button class="btn-lab" style="background: #475569; color: white;" onclick="location.href='/student/play?subject=Science'">Go Back</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        let startTime, timerInterval;
        let isRunning = false;
        const pendulum = document.getElementById('pendulum');
        const variants = [
            { count: 10, period: 2.0 },
            { count: 5, period: 3.0 },
            { count: 15, period: 1.5 }
        ];

        const state = {
            username: "{{ session.get('username') }}",
            xp: 0,
            actualPeriod: 2.0, // Default
            labStartTime: Date.now(),
            questionsCompleted: 0,
            totalQuestions: 3,
            usedVariants: []
        };

        function initRandomQuestion() {
            if (state.usedVariants.length >= variants.length) {
                state.usedVariants = [];
            }
            
            let randomIndex;
            do {
                randomIndex = Math.floor(Math.random() * variants.length);
            } while (state.usedVariants.includes(randomIndex));
            
            state.usedVariants.push(randomIndex);
            const v = variants[randomIndex];
            
            state.actualPeriod = v.period;
            
            // Adjust pendulum animation speed (duration = period)
            pendulum.style.animationDuration = v.period + 's';
            
            // Update UI
            document.getElementById('count-input').value = v.count;
            document.getElementById('mission-desc').innerText = `Start the pendulum. Count ${v.count} oscillations (one back-and-forth swing = 1 oscillation). Stop the timer and calculate the Time Period.`;
            
            // Reset tool state
            document.getElementById('stopwatch').innerText = "00:00.0";
            document.getElementById('time-input').value = "";
            document.getElementById('period-input').value = "";
            document.getElementById('start-btn').disabled = false;
            document.getElementById('stop-btn').disabled = true;
            document.getElementById('submit-btn').disabled = true;
            pendulum.style.animationPlayState = 'paused';
            isRunning = false;
        }

        function nextQuestion() {
            document.getElementById('success-modal').style.display = 'none';
            initRandomQuestion();
        }

        window.onload = initRandomQuestion;

        function toggleLab() {
            isRunning = true;
            pendulum.style.animationPlayState = 'running';
            startTime = Date.now();
            timerInterval = setInterval(updateStopwatch, 100);
            document.getElementById('start-btn').disabled = true;
            document.getElementById('stop-btn').disabled = false;
        }

        function updateStopwatch() {
            const now = Date.now();
            const diff = (now - startTime) / 1000;
            document.getElementById('stopwatch').innerText = diff.toFixed(1);
        }

        function stopLab() {
            clearInterval(timerInterval);
            pendulum.style.animationPlayState = 'paused';
            pendulum.style.transform = 'rotate(0deg)';
            
            const totalTime = document.getElementById('stopwatch').innerText;
            document.getElementById('time-input').value = totalTime;
            document.getElementById('submit-btn').disabled = false;
            document.getElementById('stop-btn').disabled = true;
        }

        function verifyResults() {
            const time = parseFloat(document.getElementById('time-input').value);
            const count = parseInt(document.getElementById('count-input').value);
            const userPeriod = parseFloat(document.getElementById('period-input').value);
            const realPeriod = time / count;

            if (Math.abs(userPeriod - realPeriod) < 0.5) {
                const submissionTime = Date.now() - state.labStartTime;
                
                // Formula: 100 + Oscillation Accuracy + Time Bonus - Penalty
                // Oscillation Accuracy = 100 * (1 - |Actual - Observed| / Actual)
                let actual = state.actualPeriod;
                let observed = userPeriod;
                let accuracy = 100 * (1 - Math.abs(actual - observed) / actual);
                
                let base = 100;
                let timeBonus = (submissionTime < 60000) ? 20 : 0; // Under 1 minute
                let penalty = (Math.abs(userPeriod - realPeriod) > 0.1) ? 10 : 0;
                
                state.xp = Math.max(0, Math.round(base + accuracy + timeBonus - penalty));
                
                showSuccess();
            } else {
                alert(`Calculation Error! \nYour period: ${userPeriod} \nCorrect: ${realPeriod.toFixed(2)} \n\nCheck your math!`);
            }
        }

        function showSuccess() {
            state.questionsCompleted++;
            document.getElementById('xp-val').innerText = state.xp;
            document.getElementById('xp-added').innerText = `+${state.xp} XP`;
            saveScore(state.xp);
            
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });

            const nextQBtn = document.getElementById('next-q-btn');
            const finishBtn = document.getElementById('finish-btn');
            
            if (state.questionsCompleted >= state.totalQuestions) {
                document.getElementById('success-title').innerText = "Lab Master! 🏁";
                document.getElementById('success-text').innerText = `Level complete. You've aced all ${state.totalQuestions} lab experiments!`;
                nextQBtn.style.display = 'none';
                finishBtn.style.display = 'block';
            } else {
                document.getElementById('success-title').innerText = "Accurate! ⭐";
                document.getElementById('success-text').innerText = `Experiment ${state.questionsCompleted} of ${state.totalQuestions} complete.`;
                nextQBtn.style.display = 'block';
                finishBtn.style.display = 'none';
            }

            document.getElementById('success-modal').style.display = 'flex';
        }

        function saveScore(xp) {
            fetch('/save_score', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `username=${encodeURIComponent(state.username)}&score=${xp}&subject=Science&game_name=G7_Phys_Ch1_L4`
            });
        }
    </script>
</body>
</html>
