<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Module - Brainiac</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <nav class="navbar">
        <div style="display: flex; flex-direction: column;">
            <h2 style="margin: 0;"><i class="fa-solid fa-atom"></i> Brainiac</h2>
            <p style="font-weight: 600; color: #0e0d30; font-size: 0.85rem; margin-top: 0.15rem; letter-spacing: 0.5px;">Learn • Play • Grow 🚀</p>
        </div>
        <ul>
            <li><a href="/student">Dashboard</a></li>
            <li><button class="btn-logout" onclick="window.location.href='/student'">Exit Game</button></li>
        </ul>
    </nav>

    <main class="main" style="display: flex; flex-direction: column; justify-content: center;">
        
        <div class="quiz-container">
            <div class="quiz-header">
                <div>
                    <h2 style="font-size: 1.25rem; font-weight: 500;">Score: 0</h2>
                </div>
                <div class="timer">
                    <i class="fa-regular fa-clock"></i> 00:45
                </div>
            </div>

            <div class="card">
                <div class="progress-bar mb-2" style="height: 6px; border-radius: 3px;">
                    <div class="progress" style="width: 25%; border-radius: 3px;"></div>
                </div>
                <p class="text-muted mb-2">Question 1 of 4</p>
                
                <h2 class="question-text">If a train travels 120 km in 2 hours, what is its average speed?</h2>

                <div class="options-grid">
                    <button class="option-btn">40 km/h</button>
                    <button class="option-btn selected">60 km/h</button>
                    <button class="option-btn">80 km/h</button>
                    <button class="option-btn">100 km/h</button>
                </div>

                <div class="quiz-footer">
                    <button>Submit Answer <i class="fa-solid fa-check ml-1"></i></button>
                </div>
            </div>
            
        </div>

    </main>

</body>
</html>
