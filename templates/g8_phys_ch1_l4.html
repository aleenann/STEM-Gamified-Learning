<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Quiz Adventure - Grade 8 Physics</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --space-bg: #f8fafc;
            --accent-blue: #3b82f6;
            --text-main: #1e293b;
        }

        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background: var(--space-bg);
            color: var(--text-main);
            overflow-x: hidden;
        }

        .game-header {
            background: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #e2e8f0;
        }

        .btn-exit {
            background: #f1f5f9;
            color: #64748b;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-exit:hover { background: #e2e8f0; color: #1e293b; }

        .game-container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .journey-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 2rem;
            position: relative;
            padding: 0 1rem;
        }
        .journey-bar::before {
            content: '';
            position: absolute;
            top: 50%; left: 0; right: 0;
            height: 4px; background: #e2e8f0;
            z-index: 1;
        }
        .planet-step {
            width: 30px; height: 30px;
            background: white;
            border: 2px solid #cbd5e1;
            border-radius: 50%;
            z-index: 2;
            display: flex;
            align-items: center; justify-content: center;
            font-size: 0.8rem;
        }
        .planet-step.active { border-color: var(--accent-blue); background: #eff6ff; color: var(--accent-blue); transform: scale(1.2); }
        .planet-step.complete { border-color: #22c55e; background: #22c55e; color: white; }

        .quiz-card {
            background: white;
            padding: 2.5rem;
            border-radius: 24px;
            border: 1px solid #e2e8f0;
            min-height: 400px;
            display: flex;
            flex-direction: column;
        }

        .difficulty-badge {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            border-radius: 6px;
            font-weight: 800;
            font-size: 0.7rem;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }
        .diff-easy { background: #dcfce7; color: #166534; }
        .diff-medium { background: #fef3c7; color: #92400e; }
        .diff-hard { background: #fee2e2; color: #991b1b; }

        .question-text {
            font-size: 1.5rem;
            font-weight: 900;
            color: #1e3a8a;
            line-height: 1.4;
            margin-bottom: 2rem;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: auto;
        }

        .option-btn {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            padding: 1.2rem;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
            display: flex; align-items: center; gap: 1rem;
        }
        .option-btn:hover { border-color: var(--accent-blue); background: #eff6ff; }
        .option-btn.correct { background: #dcfce7; border-color: #22c55e; color: #166534; }
        .option-btn.wrong { background: #fee2e2; border-color: #ef4444; color: #991b1b; }

        /* Modal */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(8px);
        }
        .modal-content {
            background: white;
            padding: 3rem;
            border-radius: 32px;
            text-align: center;
            max-width: 500px;
            width: 90%;
        }

        .points-badge {
            display: inline-block;
            padding: 0.5rem 1.5rem;
            background: #fef3c7;
            color: #92400e;
            border-radius: 12px;
            font-weight: 800;
            font-size: 1.2rem;
            margin: 1rem 0;
            border: 1px solid #fde68a;
        }
    </style>
</head>
<body>

    <div class="game-header">
        <button class="btn-exit" onclick="window.location.href='/student/play?subject=Science&sub_subject=Physics&chapter=1'"><i class="fa-solid fa-arrow-left"></i> EXIT</button>
        <div style="text-align: center;">
            <h2 style="margin: 0; font-weight: 900; color: #1e3a8a;">SPACE QUIZ JOURNEY</h2>
            <div style="font-size: 0.8rem; color: #64748b; font-weight: 600;">CLASS 8 PHYSICS • LEVEL 4</div>
        </div>
        <div style="background: #fef3c7; color: #92400e; padding: 0.5rem 1rem; border-radius: 8px; font-weight: 800;">
            STREAK: <span id="streak-val">0</span>
        </div>
    </div>

    <div class="game-container">
        <div class="journey-bar" id="journey-bar"></div>
        <div class="quiz-card">
            <div id="diff-container"></div>
            <div class="question-text" id="question-text">Loading navigation...</div>
            <div class="options-grid" id="options-grid"></div>
        </div>
    </div>

    <div id="result-modal" class="modal">
        <div class="modal-content">
            <div style="font-size: 4rem; margin-bottom: 1rem;">🚀</div>
            <h1 style="color: #1e3a8a;">Solar Explorer Status!</h1>
            <p style="color: #64748b;">You have traveled across the vastness of space and mastered the facts of our Solar System.</p>
            
            <div class="points-badge">
                <i class="fa-solid fa-star"></i> 100 XP Earned
            </div>

            <div style="display: flex; flex-direction: column; gap: 1rem; margin-top: 2rem;">
                <button onclick="window.location.reload()" style="background: var(--accent-blue); color: white; border: none; padding: 1.2rem; border-radius: 16px; font-weight: 900; cursor: pointer;">Play Again <i class="fa-solid fa-rotate-right ml-1"></i></button>
                <button class="btn-exit" style="padding: 1.2rem; width: 100%; border-radius: 16px;" onclick="window.location.href='/student/play?subject=Science&sub_subject=Physics&chapter=1'">Exit to Dashboard</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        const quizData = [
            { q: "Which planet is closest to the Sun?", options: ["Venus", "Mercury", "Earth", "Mars"], a: 1, diff: "easy" },
            { q: "Which planet do we live on?", options: ["Mars", "Jupiter", "Earth", "Saturn"], a: 2, diff: "easy" },
            { q: "Which planet is known as the 'Red Planet'?", options: ["Mars", "Venus", "Neptune", "Mercury"], a: 0, diff: "easy" },
            { q: "Which planet is the largest in the solar system?", options: ["Saturn", "Jupiter", "Uranus", "Neptune"], a: 1, diff: "easy" },
            { q: "Which planet has beautiful rings around it?", options: ["Mercury", "Uranus", "Saturn", "Jupiter"], a: 2, diff: "medium" },
            { q: "Which is the hottest planet in the solar system?", options: ["Venus", "Mercury", "Mars", "Earth"], a: 0, diff: "medium" },
            { q: "What is the natural satellite of Earth?", options: ["Phobos", "Moon", "Titan", "Ganymede"], a: 1, diff: "medium" },
            { q: "Which planet is known as the 'Morning' or 'Evening Star'?", options: ["Mars", "Venus", "Jupiter", "Mercury"], a: 1, diff: "medium" },
            { q: "Which planet rotates on its side (98° tilt)?", options: ["Neptune", "Uranus", "Saturn", "Mars"], a: 1, diff: "hard" },
            { q: "What force keeps planets in orbit around the Sun?", options: ["Magnetism", "Gravity", "Atmospheric Pressure", "Solar Wind"], a: 1, diff: "hard" }
        ];

        let currentIndex = 0;
        let streak = 0;
        let canAnswer = true;

        function initUI() {
            const bar = document.getElementById('journey-bar');
            for (let i = 0; i < quizData.length; i++) {
                const step = document.createElement('div');
                step.className = 'planet-step';
                step.id = `step-${i}`;
                step.innerText = i + 1;
                bar.appendChild(step);
            }
            loadQuestion();
        }

        function loadQuestion() {
            canAnswer = true;
            const data = quizData[currentIndex];
            document.getElementById('question-text').innerText = data.q;
            document.getElementById('streak-val').innerText = streak;
            document.getElementById('diff-container').innerHTML = `<span class="difficulty-badge diff-${data.diff}">${data.diff}</span>`;
            document.querySelectorAll('.planet-step').forEach(s => s.classList.remove('active'));
            document.getElementById(`step-${currentIndex}`).classList.add('active');
            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            data.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = `<span>${opt}</span>`;
                btn.onclick = () => handleAnswer(index, btn);
                grid.appendChild(btn);
            });
        }

        function handleAnswer(idx, btn) {
            if (!canAnswer) return;
            canAnswer = false;
            const correct = quizData[currentIndex].a;
            if (idx === correct) {
                btn.classList.add('correct');
                streak++;
                document.getElementById(`step-${currentIndex}`).classList.add('complete');
                setTimeout(() => {
                    currentIndex++;
                    if (currentIndex < quizData.length) loadQuestion();
                    else showFinalResult();
                }, 1000);
            } else {
                btn.classList.add('wrong');
                document.querySelectorAll('.option-btn')[correct].classList.add('correct');
                streak = 0;
                setTimeout(() => loadQuestion(), 1500);
            }
        }

        function showFinalResult() {
            confetti({ particleCount: 200, spread: 90, origin: { y: 0.6 } });
            saveScore();
            document.getElementById('result-modal').style.display = 'flex';
        }

        function saveScore() {
            const username = "{{ session.get('username') }}";
            fetch('/save_score', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `username=${encodeURIComponent(username)}&score=100&subject=Science&game_name=G8_Phys_Ch1_L4`
            });
        }

        initUI();
    </script>
</body>
</html>
