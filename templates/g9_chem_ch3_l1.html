<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grade 9 Chemistry: Level 1 ⚗️</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* ═══════════════════════════════════════════
   DESIGN SYSTEM — 100% offline, system fonts
═══════════════════════════════════════════ */
:root {
  --bg:       #f0fdf4;
  --surface:  #ffffff;
  --green:    #16a34a;
  --green-l:  #dcfce7;
  --green-b:  #86efac;
  --teal:     #0d9488;
  --blue:     #2563eb;
  --blue-l:   #dbeafe;
  --blue-b:   #93c5fd;
  --indigo:   #4f46e5;
  --yellow:   #d97706;
  --yellow-l: #fef9c3;
  --red:      #dc2626;
  --red-l:    #fee2e2;
  --orange:   #ea580c;
  --purple:   #7c3aed;
  --text:     #0f172a;
  --muted:    #64748b;
  --border:   #bbf7d0;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ══ TOPBAR ══ */
.topbar {
  position: sticky; top: 0; z-index: 200;
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 20px;
  background: rgba(255,255,255,0.97);
  border-bottom: 2px solid var(--border);
  box-shadow: 0 2px 12px rgba(22,163,74,0.08);
}
.topbar-logo {
  font-size: 17px; font-weight: 900;
  background: linear-gradient(135deg, #16a34a, #0d9488);
  background-clip: text;
  -webkit-background-clip: text; 
  -webkit-text-fill-color: transparent;
}
.stats-row { display: flex; gap: 8px; }
.stat-pill {
  display: flex; align-items: center; gap: 5px;
  background: var(--bg); border: 1.5px solid var(--border);
  border-radius: 20px; padding: 4px 12px;
  font-size: 12px; font-weight: 800;
}
.stat-pill .val { transition: color .3s; }
.btn-exit {
  display: flex; align-items: center; gap: 5px;
  background: var(--green-l); border: 1.5px solid var(--border);
  border-radius: 8px; padding: 5px 12px;
  font-size: 12px; font-weight: 800; color: var(--green);
  text-decoration: none; transition: background .18s;
  cursor: pointer;
}
.btn-exit:hover { background: #bbf7d0; }

/* ══ LEVEL BANNER ══ */
.level-banner {
  display: flex; align-items: center; justify-content: center; gap: 12px;
  padding: 7px 20px;
  background: linear-gradient(135deg, var(--blue), var(--indigo));
  color: white; font-size: 13px; font-weight: 800;
  position: relative; overflow: hidden;
}
.level-banner::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.07), transparent);
  animation: bannerShine 4s ease-in-out infinite;
}
@keyframes bannerShine { 0%{transform:translateX(-100%)} 100%{transform:translateX(100%)} }
.lvl-dots { display: flex; gap: 5px; }
.lvl-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: rgba(255,255,255,.28); transition: background .3s;
}
.lvl-dot.on { background: white; }
.lvl-chip {
  background: rgba(255,255,255,.18); border-radius: 8px;
  padding: 2px 10px; font-size: 11px;
}

/* ══ MAIN LAYOUT ══ */
.layout {
  display: grid;
  grid-template-columns: 172px 1fr 224px;
  height: calc(100vh - 88px);
}

/* Element Shelf */
.shelf {
  background: rgba(255,255,255,.92);
  border-right: 2px solid var(--border);
  padding: 10px 8px; overflow-y: auto;
  display: flex; flex-direction: column; gap: 5px;
}
.shelf-title {
  font-size: 9px; font-weight: 900; letter-spacing: 2px;
  text-transform: uppercase; color: var(--muted);
  padding: 2px 3px; margin-top: 4px;
}
.el-card {
  background: white; border-radius: 10px; padding: 7px 6px;
  cursor: grab; text-align: center;
  border: 2px solid var(--border);
  transition: transform .12s, box-shadow .15s, border-color .15s;
  position: relative; user-select: none;
}
.el-card:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 6px 18px rgba(0,0,0,.12); }
.el-num  { font-size: 8px; position: absolute; top: 3px; left: 5px; opacity: .38; font-weight: 700; }
.el-sym  { font-size: 19px; font-weight: 900; line-height: 1; }
.el-name { font-size: 8px; font-weight: 700; opacity: .65; margin-top: 1px; }

/* Lab bench */
.lab {
  display: flex; flex-direction: column; align-items: center;
  padding: 16px 18px; gap: 14px; overflow-y: auto;
}
.challenge-card {
  width: 100%; max-width: 500px;
  background: var(--surface); border-radius: 16px;
  border: 2px solid var(--blue-b); padding: 14px 18px;
  box-shadow: 0 4px 20px rgba(37,99,235,.08);
}
.ch-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.ch-label { font-size: 10px; font-weight: 900; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }
.diff-badge { font-size: 10px; font-weight: 800; border-radius: 20px; padding: 2px 10px; background: var(--green-l); color: var(--green); }
.ch-target  { font-size: 21px; font-weight: 900; margin-bottom: 4px; }
.ch-formula { font-size: 14px; font-weight: 800; color: var(--blue); margin-bottom: 6px; }

.mixing-zone-wrap { width: 100%; max-width: 500px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
.mixing-zone {
  width: 100%; min-height: 160px; border: 3px dashed var(--green-b); border-radius: 24px;
  position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 18px 16px; transition: all .25s; overflow: hidden;
}
.mixing-zone.drag-over { border-color: var(--green); background: #eff6ff; }
.mz-empty { display: flex; flex-direction: column; align-items: center; gap: 8px; pointer-events: none; }
.mz-empty-icon { font-size: 36px; opacity: .35; }
.mz-empty-text { font-size: 13px; font-weight: 700; color: var(--muted); text-align: center; }

.atoms-grid { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; align-items: center; width: 100%; }
.atom-chip {
  display: flex; align-items: center; gap: 6px; border-radius: 12px; padding: 8px 12px; font-weight: 900;
  font-size: 14px; position: relative; animation: chipDrop .3s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes chipDrop { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.chip-remove {
  position: absolute; top: -6px; right: -6px; background: var(--red); color: white; border: 2px solid white;
  border-radius: 50%; width: 18px; height: 18px; font-size: 9px; cursor: pointer; display: flex; align-items: center; justify-content: center;
}

.mix-btn {
  padding: 13px 40px; background: linear-gradient(135deg, var(--green), var(--teal));
  color: white; border: none; border-radius: 14px; font-size: 16px; font-weight: 900; cursor: pointer;
  box-shadow: 0 6px 22px rgba(22,163,74,.3); transition: transform .17s;
}
.mix-btn:hover { transform: translateY(-3px); }

/* Right panel */
.right-panel {
  background: rgba(255,255,255,.92); border-left: 2px solid var(--border); padding: 12px; overflow-y: auto;
  display: flex; flex-direction: column; gap: 10px;
}
.panel-section-title { font-size: 9px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
.xp-track { background: #f1f5f9; border-radius: 20px; height: 8px; overflow: hidden; margin-top: 4px; }
.xp-fill { height: 100%; background: var(--green); transition: width .6s; }
.ch-item { background: var(--bg); border: 1.5px solid var(--border); border-radius: 10px; padding: 8px; cursor: pointer; font-size: 11px; font-weight: 700; }
.ch-item.active { border-color: var(--blue); background: var(--blue-l); }
.ch-item.done { opacity: 0.6; }

/* Modal */
/* Modal */
.fb-overlay {
  position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,.45); backdrop-filter: blur(5px);
  display: none; align-items: center; justify-content: center;
  transition: opacity 0.3s;
}
.fb-modal { 
  background: white; border-radius: 24px; padding: 35px; max-width: 420px; width: 92%;
  text-align: center; border: 4px solid var(--green-b); 
  transform: scale(0.9); transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: 0 20px 50px rgba(0,0,0,0.2);
}
.fb-overlay.show { display: flex; animation: fadeIn 0.3s forwards; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.fb-emoji { font-size: 60px; display: block; margin-bottom: 10px; }
.fb-title { font-size: 24px; font-weight: 900; margin: 10px 0; color: var(--text); }
.fb-formula { font-size: 28px; font-weight: 900; color: var(--green); margin-bottom: 20px; }
.fb-xp-pill { 
  display: inline-block; background: var(--green-l); color: var(--green); 
  padding: 8px 20px; border-radius: 20px; font-weight: 900; margin-bottom: 25px;
}
.fb-btn { 
  width: 100%; padding: 14px; background: linear-gradient(135deg, var(--green), var(--teal)); 
  color: white; border: none; border-radius: 14px; font-size: 16px; font-weight: 800; 
  cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
}
.fb-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(22,163,74,0.3); }

/* Toast Notification */
.toast {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
  background: #1e293b; color: white; padding: 12px 25px; border-radius: 12px;
  font-weight: 700; font-size: 14px; z-index: 1000; transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: 0 10px 30px rgba(0,0,0,0.2); display: flex; align-items: center; gap: 10px;
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast i { color: #f87171; }


</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">⚗️ Grade 9 Chemistry</div>
  <div class="stats-row">
    <div class="stat-pill">⭐ <span id="statXP">0</span> XP</div>
  </div>
  <button class="btn-exit" onclick="window.location.href='/student/play?subject=Science&sub_subject=Chemistry&chapter=3'">
      <i class="fa-solid fa-person-running"></i> EXIT
  </button>
</div>

<div class="level-banner">
  <span id="lvlTitle">Level 1 — Easy</span>
  <span class="lvl-chip">Atoms & Molecules</span>
</div>

<div class="layout">
  <div class="shelf">
    <div class="shelf-title">Elements</div>
    <div id="shelfEl"></div>
  </div>

  <div class="lab">
    <div class="challenge-card" id="challengeCard">
      <div class="ch-row">
        <span class="ch-label" id="chLabel">Challenge 1</span>
        <span class="diff-badge">Easy</span>
      </div>
      <div class="ch-target" id="chTarget">Make Water</div>
      <div class="ch-formula" id="chFormula">Formula: H₂O</div>
    </div>

    <div class="mixing-zone-wrap">
      <div class="mixing-zone" id="mixingZone" ondragover="allowDrop(event)" ondrop="drop(event)">
        <div class="mz-empty" id="mzEmpty">
          <div class="mz-empty-icon">⚗️</div>
          <div class="mz-empty-text">Drop elements here!</div>
        </div>
        <div class="atoms-grid" id="atomsGrid" style="display:none"></div>
      </div>
    </div>

    <button class="mix-btn" onclick="handleMix()">🧪 MIX!</button>
  </div>

  <div class="right-panel">
    <div class="panel-section-title">Progress</div>
    <div id="xpLbl">XP: 0</div>
    <div class="xp-track"><div class="xp-fill" id="xpFill" style="width:0%"></div></div>
    <div class="panel-section-title" style="margin-top:10px">Challenges</div>
    <div id="chList"></div>
  </div>
</div>

<div class="fb-overlay" id="fbOverlay">
  <div class="fb-modal">
    <div class="fb-emoji">🎉</div>
    <div class="fb-title">Correct!</div>
    <div class="fb-formula" id="fbFormulaModal">H₂O</div>
    <p id="fbExplain" style="margin-bottom:20px; font-size:13px; color:var(--muted);"></p>
    <button class="fb-btn" onclick="nextLevel()">Continue →</button>
  </div>
</div>

<script>
const ELEMENTS = [
  { s:'H',  n:'Hydrogen',  num:1,  c:'#dcfce7' },
  { s:'O',  n:'Oxygen',    num:8,  c:'#dcfce7' },
  { s:'Na', n:'Sodium',    num:11, c:'#fce7f3' },
  { s:'Cl', n:'Chlorine',  num:17, c:'#ede9fe' },
];

const CHALLENGES = [
  { id:0, name:'Make Water', target:{H:2, O:1}, formula:'H₂O', explain:'Water is formed when two hydrogen atoms bond with one oxygen atom.' },
  { id:1, name:'Make Table Salt', target:{Na:1, Cl:1}, formula:'NaCl', explain:'Sodium and Chlorine combine to form Sodium Chloride (Salt).' },
  { id:2, name:'Make Oxygen Gas', target:{O:2}, formula:'O₂', explain:'Two oxygen atoms bond together to form the oxygen we breathe.' },
  { id:3, name:'Make Hydrogen Gas', target:{H:2}, formula:'H₂', explain:'Two hydrogen atoms bond together to form hydrogen gas.' },
];

let currentXP = 0;
let activeChallengeIdx = 0;
let mixingAtoms = {};

function init() {
    const shelf = document.getElementById('shelfEl');
    ELEMENTS.forEach(el => {
        const div = document.createElement('div');
        div.className = 'el-card';
        div.style.background = el.c;
        div.draggable = true;
        div.innerHTML = `<div class="el-num">${el.num}</div><div class="el-sym">${el.s}</div><div class="el-name">${el.n}</div>`;
        div.onclick = () => addAtom(el.s);
        div.ondragstart = (e) => e.dataTransfer.setData('text', el.s);
        shelf.appendChild(div);
    });
    updateChallenge();
    renderChallenges();
}

function allowDrop(e) { e.preventDefault(); document.getElementById('mixingZone').classList.add('drag-over'); }
function drop(e) {
    e.preventDefault();
    document.getElementById('mixingZone').classList.remove('drag-over');
    const sym = e.dataTransfer.getData('text');
    addAtom(sym);
}

function addAtom(sym) {
    mixingAtoms[sym] = (mixingAtoms[sym] || 0) + 1;
    renderMixingZone();
}

function removeAtom(sym) {
    if (mixingAtoms[sym] > 1) mixingAtoms[sym]--;
    else delete mixingAtoms[sym];
    renderMixingZone();
}

function renderMixingZone() {
    const grid = document.getElementById('atomsGrid');
    const empty = document.getElementById('mzEmpty');
    grid.innerHTML = '';
    const keys = Object.keys(mixingAtoms);
    if (keys.length > 0) {
        grid.style.display = 'flex';
        empty.style.display = 'none';
        keys.forEach(sym => {
            const chip = document.createElement('div');
            chip.className = 'atom-chip';
            chip.style.background = ELEMENTS.find(e => e.s === sym).c;
            chip.innerHTML = `${sym} <span style="margin-left:5px; background:rgba(0,0,0,0.1); padding:2px 6px; border-radius:5px;">${mixingAtoms[sym]}</span>`;
            const del = document.createElement('div');
            del.className = 'chip-remove';
            del.innerHTML = '×';
            del.onclick = (e) => { e.stopPropagation(); removeAtom(sym); };
            chip.appendChild(del);
            grid.appendChild(chip);
        });
    } else {
        grid.style.display = 'none';
        empty.style.display = 'flex';
    }
}

function handleMix() {
    const target = CHALLENGES[activeChallengeIdx].target;
    let match = true;
    const targetKeys = Object.keys(target);
    const mixingKeys = Object.keys(mixingAtoms);
    
    if (targetKeys.length !== mixingKeys.length) match = false;
    else {
        targetKeys.forEach(k => { if (target[k] !== mixingAtoms[k]) match = false; });
    }

    if (match) {
        showFeedback(CHALLENGES[activeChallengeIdx]);
    } else {
        showToast("Incorrect formula! Check your atom counts.");
    }
}

function showToast(msg) {
    const toast = document.getElementById('errorToast');
    document.getElementById('toastMsg').innerText = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
}

function showFeedback(ch) {
    document.getElementById('fbEmoji').innerText = '🎉';
    document.getElementById('fbTitle').innerText = 'Correct!';
    document.getElementById('fbFormulaModal').innerText = ch.formula;
    document.getElementById('fbExplain').innerText = ch.explain;
    document.getElementById('fbXP').innerText = '+25 XP';
    
    if (activeChallengeIdx >= CHALLENGES.length - 1) {
        document.getElementById('fbEmoji').innerText = '🏆';
        document.getElementById('fbTitle').innerText = 'Level 1 Completed!';
        document.getElementById('fbExplain').innerText = 'You completed all equations successfully.';
        document.getElementById('fbXP').innerText = `Final XP: ${currentXP + 25}`;
        document.getElementById('fbBtn').innerText = 'Back to Map';
        saveScore(currentXP + 25);
    } else {
        document.getElementById('fbBtn').innerText = 'Next Challenge →';
    }
    
    document.getElementById('fbOverlay').classList.add('show');
    currentXP += 25;
    updateXP();
}

function handleModalNext() {
    if (activeChallengeIdx >= CHALLENGES.length - 1) {
        window.location.href = '/student/play?subject=Science&sub_subject=Chemistry&chapter=3';
    } else {
        closeFeedback();
    }
}

function closeFeedback() {
    document.getElementById('fbOverlay').classList.remove('show');
    mixingAtoms = {};
    renderMixingZone();
    activeChallengeIdx++;
    updateChallenge();
    renderChallenges();
}

function updateChallenge() {
    const ch = CHALLENGES[activeChallengeIdx];
    document.getElementById('chTarget').innerText = ch.name;
    document.getElementById('chFormula').innerText = `Formula: ${ch.formula}`;
    document.getElementById('chLabel').innerText = `Challenge ${activeChallengeIdx + 1}`;
}

function renderChallenges() {
    const list = document.getElementById('chList');
    list.innerHTML = '';
    CHALLENGES.forEach((ch, idx) => {
        const div = document.createElement('div');
        div.className = `ch-item ${idx === activeChallengeIdx ? 'active' : ''} ${idx < activeChallengeIdx ? 'done' : ''}`;
        div.innerText = ch.name;
        list.appendChild(div);
    });
}

function updateXP() {
    document.getElementById('statXP').innerText = currentXP;
    document.getElementById('xpLbl').innerText = `XP: ${currentXP}`;
    const fill = Math.min((currentXP / 100) * 100, 100);
    document.getElementById('xpFill').style.width = fill + '%';
}

function saveScore(score) {
    fetch('/save_score', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({
            username: "{{ session.get('username') }}",
            score: score,
            subject: 'Science',
            game_name: 'G9_Chem_Ch3_L1'
        })
    });
}

init();
</script>
</body>
</html>
