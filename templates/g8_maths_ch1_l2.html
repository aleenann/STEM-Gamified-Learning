<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chocolate Cutter | Mensuration Challenge</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bar-color: #5d4037;
            --bar-light: #8d6e63;
            --cream: #fff9f0;
            --accent: #ff9800;
            --bg: #fffbf5;
            --text: #3e2723;
            --border: #d7ccc8;
        }

        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
            overflow-x: hidden;
        }

        /* --- Header & Mission --- */
        .game-header {
            text-align: center;
            max-width: 600px;
            margin-bottom: 2rem;
        }

        .level-tag {
            background: #ffe0b2;
            color: #e65100;
            padding: 0.4rem 1rem;
            border-radius: 99px;
            font-weight: 800;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        h1 { font-size: 2.5rem; font-weight: 900; margin: 1rem 0; color: var(--bar-color); }
        .mission-desc { font-size: 1.1rem; color: #795548; line-height: 1.5; }

        /* --- Task Box --- */
        .task-box {
            background: white;
            padding: 1.5rem 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(93, 64, 55, 0.1);
            border: 2px solid var(--border);
            margin-bottom: 2rem;
            text-align: center;
            min-width: 300px;
        }

        .task-label { font-size: 0.9rem; font-weight: 600; color: #a1887f; text-transform: uppercase; }
        .target-area { font-size: 2.2rem; font-weight: 900; color: var(--bar-color); display: block; margin-top: 5px; }

        /* --- Chocolate Grid --- */
        .chocolate-bar-container {
            position: relative;
            padding: 15px;
            background: #4e342e; /* Wrapper board */
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            user-select: none;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(10, 40px);
            grid-template-rows: repeat(10, 40px);
            gap: 2px;
            background: rgba(0,0,0,0.1);
            cursor: crosshair;
        }

        .cell {
            width: 40px;
            height: 40px;
            background: var(--bar-color);
            border-radius: 3px;
            transition: all 0.2s;
            position: relative;
            border: 1px solid rgba(0,0,0,0.1);
        }

        .cell::after {
            content: '';
            position: absolute;
            top: 2px; left: 2px; right: 2px; bottom: 2px;
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 2px;
        }

        .cell.selected {
            background: var(--accent);
            transform: scale(0.95);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
        }

        /* --- Controls --- */
        .stats {
            margin-top: 2rem;
            display: flex;
            gap: 2rem;
            font-weight: 800;
            font-size: 1.2rem;
        }

        .stat-item { display: flex; align-items: center; gap: 0.5rem; }
        .curr-area { color: var(--accent); }

        .btn-cut {
            margin-top: 2rem;
            padding: 1rem 3rem;
            background: var(--bar-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-cut:hover { background: #3e2723; transform: scale(1.05); }

        /* --- Overlay --- */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(62, 39, 35, 0.9);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            color: white;
        }

        .btn-exit {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: white;
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <button class="btn-exit" onclick="history.back()">EXIT <i class="fa-solid fa-right-from-bracket ml-1"></i></button>

    <div class="game-header">
        <span class="level-tag">The Gourmet Slicer</span>
        <h1>Chocolate Cutter</h1>
        <p class="mission-desc">A customer needs a specific amount of chocolate. Drag across the bar to cut the exact area requested!</p>
    </div>

    <div class="task-box">
        <span class="task-label">Customer Request</span>
        <span id="target-area-display" class="target-area">12 cm²</span>
    </div>

    <div class="chocolate-bar-container">
        <div id="grid" class="grid">
            <!-- 10x10 Cells -->
        </div>
    </div>

    <div class="stats">
        <div class="stat-item">Selected Area: <span id="current-area" class="curr-area">0</span> cm²</div>
        <div class="stat-item">Score: <span id="score-val">0</span></div>
    </div>

    <button class="btn-cut" onclick="checkCut()">Complete This Order!</button>

    <div id="overlay" class="overlay">
        <div style="text-align: center;">
            <i class="fa-solid fa-cookie-bite" style="font-size: 5rem; color: var(--accent); margin-bottom: 1.5rem;"></i>
            <h2>Perfectly Sliced!</h2>
            <p>Score: <span id="final-xp">50</span> XP earned.</p>
            <button class="btn-cut" onclick="nextOrder()">Next Customer ➡️</button>
        </div>
    </div>

    <script>
        const grid = document.getElementById('grid');
        const currentAreaDisplay = document.getElementById('current-area');
        const targetAreaDisplay = document.getElementById('target-area-display');
        
        let isDragging = false;
        let startX, startY;
        let selectedArea = 0;
        let currentTarget = 12;
        let score = 0;
        let ordersCompleted = 0;

        // Create 10x10 grid
        for (let i = 0; i < 100; i++) {
            const cell = document.createElement('div');
            cell.dataset.index = i;
            cell.className = 'cell';
            cell.dataset.r = Math.floor(i / 10);
            cell.dataset.c = i % 10;
            grid.appendChild(cell);
        }

        const cells = document.querySelectorAll('.cell');

        grid.addEventListener('mousedown', (e) => {
            const cell = e.target.closest('.cell');
            if (!cell) return;
            isDragging = true;
            startX = parseInt(cell.dataset.c);
            startY = parseInt(cell.dataset.r);
            updateSelection(startX, startY);
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const cell = e.target.closest('.cell');
            if (!cell) return;
            updateSelection(parseInt(cell.dataset.c), parseInt(cell.dataset.r));
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
        });

        function updateSelection(endX, endY) {
            const minX = Math.min(startX, endX);
            const maxX = Math.max(startX, endX);
            const minY = Math.min(startY, endY);
            const maxY = Math.max(startY, endY);

            let count = 0;
            cells.forEach(cell => {
                const r = parseInt(cell.dataset.r);
                const c = parseInt(cell.dataset.c);
                if (r >= minY && r <= maxY && c >= minX && c <= maxX) {
                    cell.classList.add('selected');
                    count++;
                } else {
                    cell.classList.remove('selected');
                }
            });

            selectedArea = count;
            currentAreaDisplay.innerText = selectedArea;
        }

        function checkCut() {
            if (selectedArea === currentTarget) {
                score += 50;
                ordersCompleted++;
                document.getElementById('overlay').style.display = 'flex';
                document.getElementById('score-val').innerText = score;
            } else {
                alert(`That's ${selectedArea} cm², but the customer needs ${currentTarget} cm²!`);
            }
        }

        function nextOrder() {
            document.getElementById('overlay').style.display = 'none';
            if (ordersCompleted < 5) {
                // Pick new target
                const w = Math.floor(Math.random() * 8) + 2;
                const h = Math.floor(Math.random() * 8) + 2;
                currentTarget = w * h;
                targetAreaDisplay.innerText = `${currentTarget} cm²`;
                
                // Clear grid
                cells.forEach(c => c.classList.remove('selected'));
                selectedArea = 0;
                currentAreaDisplay.innerText = 0;
            } else {
                saveFinalScore();
            }
        }

        function saveFinalScore() {
            fetch("/student/games/save_score", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    game_name: "G8_Maths_Ch1_L2",
                    xp: score,
                    subject: "Maths"
                })
            }).then(() => {
                alert("Game Complete! Master Slicer Status Achieved. XP: " + score);
                window.location.href = "/student/learn?subject=Maths&chapter=1";
            });
        }

        // Initialize first target
        nextOrder();
    </script>
</body>
</html>
