<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moon Phase Puzzle - Grade 8 Physics</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --moon-bg: #f8fafc;
            --accent-blue: #3b82f6;
            --text-main: #1e293b;
        }

        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background: var(--moon-bg);
            color: var(--text-main);
            overflow-x: hidden;
        }

        .game-header {
            background: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #e2e8f0;
        }

        .btn-exit {
            background: #f1f5f9;
            color: #64748b;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-exit:hover { background: #e2e8f0; color: #1e293b; }

        .game-container {
            max-width: 900px;
            margin: 3rem auto;
            padding: 0 1rem;
            text-align: center;
        }

        .instruction-card {
            background: white;
            padding: 2rem;
            border-radius: 24px;
            border: 1px solid #e2e8f0;
            margin-bottom: 2rem;
        }

        .puzzle-grid {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }

        .phase-slot {
            background: #eff6ff;
            border: 2px dashed #bfdbfe;
            border-radius: 20px;
            width: 160px;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .phase-slot::after {
            content: attr(data-index);
            position: absolute;
            top: 10px; left: 15px;
            font-size: 2.5rem;
            font-weight: 900;
            color: rgba(59, 130, 246, 0.1);
        }

        .phase-card {
            background: white;
            width: 140px;
            padding: 1rem;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            cursor: grab;
            transition: all 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            user-select: none;
            z-index: 10;
        }
        .phase-card:active { cursor: grabbing; transform: scale(0.95); }
        .phase-card.dragging { opacity: 0.5; transform: scale(1.1); }
        .phase-card.wrong { border-color: #ef4444; background: #fef2f2; }

        .moon-icon {
            font-size: 3.5rem;
            margin-bottom: 0.5rem;
            display: block;
            color: #1e293b;
        }

        .phase-name { font-weight: 700; font-size: 0.9rem; color: #475569; }

        .bank {
            background: white;
            padding: 2rem;
            border-radius: 24px;
            border: 1px solid #e2e8f0;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
            min-height: 120px;
        }

        .btn-check {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 1.2rem 3rem;
            border-radius: 16px;
            font-size: 1.2rem;
            font-weight: 900;
            cursor: pointer;
            width: 100%;
            margin-top: 2rem;
            box-shadow: 0 4px 14px rgba(59, 130, 246, 0.4);
        }

        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(8px);
        }
        .modal-content {
            background: white;
            padding: 3rem;
            border-radius: 32px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            border: 1px solid #e2e8f0;
        }

        .points-badge {
            display: inline-block;
            padding: 0.5rem 1.5rem;
            background: #fef3c7;
            color: #92400e;
            border-radius: 12px;
            font-weight: 800;
            font-size: 1.2rem;
            margin: 1rem 0;
            border: 1px solid #fde68a;
        }

        .modal-btn-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 2rem;
        }
    </style>
</head>
<body>

    <div class="game-header">
        <button class="btn-exit" onclick="window.location.href='/student/play?subject=Science&sub_subject=Physics&chapter=1'"><i class="fa-solid fa-arrow-left"></i> EXIT</button>
        <div style="text-align: center;">
            <h2 style="margin: 0; font-weight: 900; color: #1e3a8a;">MOON PHASE PUZZLE</h2>
            <div style="font-size: 0.8rem; color: #64748b; font-weight: 600;">CLASS 8 PHYSICS • LEVEL 3</div>
        </div>
        <div style="background: #fef3c7; color: #92400e; padding: 0.5rem 1rem; border-radius: 8px; font-weight: 800;">
            MISSION: CYCLE
        </div>
    </div>

    <div class="game-container">
        <div class="instruction-card">
            <h3 style="margin-top: 0; color: #1e3a8a;">Master the Lunar Cycle! 🌒</h3>
            <p class="text-muted">Drag the 5 core moon phases into the correct sequence (1 to 5), starting from the New Moon.</p>
        </div>

        <div class="puzzle-grid" id="puzzle-grid">
            <div class="phase-slot" data-index="1"></div>
            <div class="phase-slot" data-index="2"></div>
            <div class="phase-slot" data-index="3"></div>
            <div class="phase-slot" data-index="4"></div>
            <div class="phase-slot" data-index="5"></div>
        </div>

        <div class="bank" id="phase-bank"></div>

        <button class="btn-check" onclick="checkCycle()">VALIDATE LUNAR CYCLE <i class="fa-solid fa-moon ml-1"></i></button>
    </div>

    <div id="result-modal" class="modal">
        <div class="modal-content">
            <div style="font-size: 4rem; margin-bottom: 1rem;">🌕</div>
            <h1 style="color: #1e3a8a; margin-bottom: 0.5rem;">Cycle Complete!</h1>
            <p style="color: #64748b;">You have mastered the waxing and waning of the moon. Excellent observation!</p>
            
            <div class="points-badge">
                <i class="fa-solid fa-star"></i> 100 XP Earned
            </div>

            <div class="modal-btn-group">
                <button class="btn-check" style="margin: 0;" onclick="window.location.href='/student/play/phys/g8/ch1_l4'">Next Mission: Space Quiz Journey <i class="fa-solid fa-arrow-right ml-1"></i></button>
                <button onclick="window.location.reload()" style="background: #f1f5f9; color: #475569; border: none; padding: 1rem; border-radius: 12px; font-weight: 700; cursor: pointer;">Play Again <i class="fa-solid fa-rotate-right ml-1"></i></button>
                <button class="btn-exit" style="padding: 1rem; width: 100%; border-radius: 12px;" onclick="window.location.href='/student/play?subject=Science&sub_subject=Physics&chapter=1'">Exit to Dashboard</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        const phases = [
            { id: 'new', name: 'New Moon', icon: '🌑' },
            { id: 'crescent', name: 'Crescent', icon: '🌒' },
            { id: 'quarter', name: 'Quarter', icon: '🌓' },
            { id: 'full', name: 'Full Moon', icon: '🌕' },
            { id: 'last-qtr', name: 'Last Qtr', icon: '🌗' }
        ];

        let shuffled = [...phases].sort(() => Math.random() - 0.5);
        const bank = document.getElementById('phase-bank');

        function init() {
            bank.innerHTML = '';
            shuffled.forEach(p => {
                const card = document.createElement('div');
                card.className = 'phase-card';
                card.draggable = true;
                card.id = p.id;
                card.innerHTML = `<span class="moon-icon">${p.icon}</span><span class="phase-name">${p.name}</span>`;
                card.addEventListener('dragstart', e => {
                    e.dataTransfer.setData('id', p.id);
                    card.classList.add('dragging');
                });
                card.addEventListener('dragend', () => card.classList.remove('dragging'));
                bank.appendChild(card);
            });

            const slots = document.querySelectorAll('.phase-slot');
            slots.forEach(slot => {
                slot.addEventListener('dragover', e => e.preventDefault());
                slot.addEventListener('drop', e => {
                    e.preventDefault();
                    const phaseId = e.dataTransfer.getData('id');
                    const card = document.getElementById(phaseId);
                    if (slot.children.length > 0) bank.appendChild(slot.children[0]);
                    slot.appendChild(card);
                    card.classList.remove('wrong');
                });
            });

            bank.addEventListener('dragover', e => e.preventDefault());
            bank.addEventListener('drop', e => {
                e.preventDefault();
                const id = e.dataTransfer.getData('id');
                bank.appendChild(document.getElementById(id));
            });
        }

        function checkCycle() {
            const slots = document.querySelectorAll('.phase-slot');
            let isCorrect = true;
            let filledCount = 0;
            slots.forEach((slot, index) => {
                if (slot.children.length === 0) { isCorrect = false; return; }
                filledCount++;
                const cardId = slot.children[0].id;
                if (cardId !== phases[index].id) {
                    isCorrect = false;
                    slot.children[0].classList.add('wrong');
                } else {
                    slot.children[0].classList.remove('wrong');
                }
            });
            if (isCorrect && filledCount === phases.length) {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                saveScore();
                document.getElementById('result-modal').style.display = 'flex';
            } else {
                alert("The lunar cycle is out of order! Ensure the phases follow the waxing and waning sequence.");
            }
        }

        function saveScore() {
            const username = "{{ session.get('username') }}";
            fetch('/save_score', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `username=${encodeURIComponent(username)}&score=100&subject=Science&game_name=G8_Phys_Ch1_L3`
            });
        }
        init();
    </script>
</body>
</html>
