<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Measurement Master - Grade 7 Motion & Time</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --lab-blue: #3b82f6;
            --lab-bg: #f8fafc;
            --lab-panel: #ffffff;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --ruler-yellow: #fde047;
        }

        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background: var(--lab-bg);
            color: #1e293b;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .game-header {
            background: #1e293b;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            z-index: 100;
        }

        .stat-badge {
            background: rgba(255,255,255,0.1);
            padding: 0.6rem 1.2rem;
            border-radius: 12px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .main-workspace {
            flex: 1;
            padding: 2rem;
            position: relative;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 30px 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Tools */
        .ruler {
            width: 400px;
            height: 60px;
            background: var(--ruler-yellow);
            border: 2px solid #a16207;
            position: absolute;
            top: 100px; left: 100px;
            cursor: move;
            user-select: none;
            display: flex;
            align-items: flex-start;
            padding-top: 2px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            z-index: 50;
            border-radius: 4px;
        }

        .tick {
            width: 1px;
            background: #a16207;
            position: absolute;
        }
        .tick-cm { height: 15px; top: 0; }
        .tick-mm { height: 7px; top: 0; }
        .tick-label {
            position: absolute;
            top: 18px;
            font-size: 10px;
            font-weight: 900;
            color: #a16207;
            transform: translateX(-50%);
        }

        .stopwatch-container {
            background: #1e293b;
            color: white;
            padding: 1.5rem;
            border-radius: 20px;
            text-align: center;
            width: 180px;
            position: absolute;
            bottom: 40px; right: 40px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .sw-display { font-size: 2rem; font-weight: 950; font-family: monospace; margin-bottom: 0.5rem; color: var(--lab-blue); }
        .sw-btn {
            background: #334155;
            border: none;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 700;
            transition: all 0.2s;
        }
        .sw-btn:hover { background: var(--lab-blue); }

        /* Measurement Targets */
        .measurement-target {
            background: #fff;
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        .object-vessel {
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 2rem 0;
            position: relative;
        }

        .test-object {
            background: var(--lab-blue);
            border-radius: 8px;
            transition: all 0.3s;
        }

        /* Controls */
        .input-panel {
            background: white;
            padding: 1rem 2rem;
            border-radius: 99px;
            display: flex;
            gap: 1rem;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-top: auto;
        }

        .measure-input {
            border: 2px solid #e2e8f0;
            padding: 0.6rem 1rem;
            border-radius: 12px;
            width: 100px;
            font-weight: 700;
            text-align: center;
        }

        .btn-submit {
            background: var(--lab-blue);
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 99px;
            font-weight: 900;
            cursor: pointer;
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 3rem;
            border-radius: 32px;
            text-align: center;
            max-width: 500px;
        }

        .score-circle {
            width: 100px; height: 100px;
            border-radius: 50%;
            background: var(--accent-green);
            color: white;
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; font-weight: 900; margin: 1rem auto;
        }
    </style>
</head>
<body>

    <div class="game-header">
        <a href="/student/play?subject=Science" style="text-decoration: none; color: #94a3b8; font-weight: 700;">
            <i class="fa-solid fa-arrow-left"></i> End Session
        </a>
        <h2 style="margin: 0;">MEASUREMENT MASTER</h2>
        <div class="stat-badge">
            <i class="fa-solid fa-star" style="color: #fbbf24;"></i> <span id="xp-val">0</span> XP
        </div>
    </div>

    <div class="main-workspace">
        <div class="measurement-target">
            <h3 style="margin-top: 0;" id="mission-text">Measure the length of the blue bar.</h3>
            <p style="color: #64748b; font-size: 0.9rem;">Move the ruler precisely to the edges!</p>
            
            <div class="object-vessel" id="object-vessel">
                <div id="target-object" class="test-object" style="width: 250px; height: 40px;"></div>
            </div>
            
            <div style="font-size: 0.8rem; color: #94a3b8;">Current Tool: 30cm Lab Ruler</div>
        </div>

        <!-- Virtual Ruler -->
        <div class="ruler" id="ruler">
            <!-- Ticks generated by JS -->
        </div>

        <!-- Stopwatch -->
        <div class="stopwatch-container">
            <div class="sw-display" id="sw-display">00.00</div>
            <div style="display: flex; gap: 0.5rem; justify-content: center;">
                <button class="sw-btn" onclick="toggleSW()" id="sw-toggle">START</button>
                <button class="sw-btn" onclick="resetSW()">RESET</button>
            </div>
        </div>

        <div class="input-panel">
            <label style="font-weight: 800;">YOUR MEASUREMENT:</label>
            <input type="number" step="0.1" class="measure-input" id="measure-input" placeholder="0.0">
            <span style="font-weight: 800;" id="unit-label">CM</span>
            <button class="btn-submit" onclick="submitMeasure()">CHECK ACCURACY</button>
        </div>
    </div>

    <div id="feedback-modal" class="modal">
        <div class="modal-content">
            <h2 id="feedback-title">Great Precision!</h2>
            <div class="score-circle" id="precision-score">98%</div>
            <p id="feedback-msg" style="color: #64748b; line-height: 1.6;"></p>
            <button class="btn-submit" style="width: 100%; margin-top: 1rem;" onclick="nextMission()">Next Mission</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        const state = {
            xp: 0,
            mission: 0,
            targetVal: 25, // cm (multiplied by pixels later)
            isTimeTask: false,
            swActive: false,
            swTime: 0,
            swInterval: null,
            username: "{{ session.get('username') }}"
        };

        const pixPerCm = 15; // Adjusted for better visibility on screen

        function initRuler() {
            const ruler = document.getElementById('ruler');
            for(let i=0; i<=30; i++) {
                const isCm = true;
                const tick = document.createElement('div');
                tick.className = 'tick tick-cm';
                tick.style.left = (i * pixPerCm) + 'px';
                ruler.appendChild(tick);

                const label = document.createElement('div');
                label.className = 'tick-label';
                label.style.left = (i * pixPerCm) + 'px';
                label.innerText = i;
                ruler.appendChild(label);

                // mm ticks
                for(let j=1; j<10; j++) {
                    const mmTick = document.createElement('div');
                    mmTick.className = 'tick tick-mm';
                    mmTick.style.left = (i * pixPerCm + (j * pixPerCm / 10)) + 'px';
                    ruler.appendChild(mmTick);
                }
            }
            ruler.style.width = (30 * pixPerCm) + 'px';
            makeDraggable(ruler);
        }

        function makeDraggable(el) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            el.onmousedown = dragMouseDown;

            function dragMouseDown(e) {
                e.preventDefault();
                pos3 = e.clientX;
                pos4 = e.clientY;
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
            }

            function elementDrag(e) {
                e.preventDefault();
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                el.style.top = (el.offsetTop - pos2) + "px";
                el.style.left = (el.offsetLeft - pos1) + "px";
            }

            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;
            }
        }

        // Stopwatch logic
        function toggleSW() {
            const btn = document.getElementById('sw-toggle');
            if(!state.swActive) {
                state.swActive = true;
                btn.innerText = 'STOP';
                btn.style.background = 'var(--accent-red)';
                state.swInterval = setInterval(() => {
                    state.swTime += 0.01;
                    document.getElementById('sw-display').innerText = state.swTime.toFixed(2);
                }, 10);
            } else {
                state.swActive = false;
                btn.innerText = 'START';
                btn.style.background = '#334155';
                clearInterval(state.swInterval);
            }
        }

        function resetSW() {
            state.swTime = 0;
            document.getElementById('sw-display').innerText = '00.00';
            if(state.swActive) toggleSW();
        }

        function submitMeasure() {
            const input = parseFloat(document.getElementById('measure-input').value);
            if(isNaN(input)) return;

            const diff = Math.abs(input - state.targetVal);
            const accuracy = Math.max(0, 100 - (diff / state.targetVal * 100)).toFixed(1);
            
            const modal = document.getElementById('feedback-modal');
            const scoreEl = document.getElementById('precision-score');
            const msgEl = document.getElementById('feedback-msg');
            const titleEl = document.getElementById('feedback-title');

            scoreEl.innerText = accuracy + '%';
            
            if(accuracy > 95) {
                titleEl.innerText = "Master Precision!";
                msgEl.innerText = `Incredible accuracy! The actual ${state.isTimeTask ? 'time' : 'length'} was ${state.targetVal}${state.isTimeTask ? 's' : 'cm'}.`;
                state.xp += 50;
                confetti();
            } else if(accuracy > 80) {
                titleEl.innerText = "Good Job!";
                msgEl.innerText = `Not bad! A bit more focus on the alignment and you'll be perfect. Actual value: ${state.targetVal}${state.isTimeTask ? 's' : 'cm'}.`;
                state.xp += 20;
            } else {
                titleEl.innerText = "Keep Practicing";
                msgEl.innerText = `Looks like you missed it. Use the tools more carefully! Actual value: ${state.targetVal}${state.isTimeTask ? 's' : 'cm'}.`;
                state.xp += 5;
            }

            document.getElementById('xp-val').innerText = state.xp;
            modal.style.display = 'flex';
            saveScore();
        }

        function nextMission() {
            document.getElementById('feedback-modal').style.display = 'none';
            document.getElementById('measure-input').value = '';
            state.mission++;
            
            const obj = document.getElementById('target-object');
            const missionText = document.getElementById('mission-text');
            const unitLabel = document.getElementById('unit-label');

            if(state.mission % 2 !== 0) {
                // Time Task
                state.isTimeTask = true;
                missionText.innerText = "Measure the blink interval of this light.";
                unitLabel.innerText = "SEC";
                obj.style.width = '60px';
                obj.style.height = '60px';
                obj.style.borderRadius = '50%';
                
                state.targetVal = parseFloat((Math.random() * 5 + 2).toFixed(2));
                startBlinkEffect(obj, state.targetVal);
            } else {
                // Length Task
                state.isTimeTask = false;
                missionText.innerText = "Measure the length of the new bar.";
                unitLabel.innerText = "CM";
                obj.style.borderRadius = '8px';
                obj.style.height = '40px';
                
                state.targetVal = Math.floor(Math.random() * 20 + 5);
                obj.style.width = (state.targetVal * pixPerCm) + 'px';
                stopBlinkEffect();
            }
        }

        let blinkTimeout;
        function startBlinkEffect(el, interval) {
            el.style.background = 'var(--lab-blue)';
            setTimeout(() => {
                el.style.background = 'white';
                blinkTimeout = setTimeout(() => startBlinkEffect(el, interval), interval * 1000);
            }, 200);
        }

        function stopBlinkEffect() {
            clearTimeout(blinkTimeout);
            document.getElementById('target-object').style.background = 'var(--lab-blue)';
        }

        function saveScore() {
            fetch('/save_score', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `username=${encodeURIComponent(state.username)}&score=${state.xp}&subject=Science&game_name=G7_Phys_Ch9_L2`
            });
        }

        window.onload = initRuler;
    </script>
</body>
</html>
